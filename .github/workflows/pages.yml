# Auto-deploy a GitHub Pages cuando hay push a main
# Sirve solo los archivos del frontend (root) — backend se ignora.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Prepare frontend artifact
        run: |
          mkdir -p _site
          # Páginas HTML
          cp *.html _site/
          # Carpeta de assets (api.js compartido, futuros recursos)
          cp -r assets _site/ 2>/dev/null || true
          # Documentación markdown
          cp *.md _site/ 2>/dev/null || true
          # No copiamos /backend porque GitHub Pages solo sirve estáticos

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
