    // Slugifica nombres de categoría → matchea las claves locales (pollos, parrillas, etc.)
    const slugify = (s) => s.toLowerCase()
      .normalize("NFD").replace(/[̀-ͯ]/g, "")
      .replace(/[^a-z0-9]+/g, "_").replace(/^_|_$/g, "")
      .replace(/^pollos.*/, "pollos")
      .replace(/^parrillas$/, "parrillas")
      .replace(/^para_compartir$/, "compartir")
      .replace(/^sandwiches$/, "sandwiches")
      .replace(/^ensaladas$/, "ensaladas")
      .replace(/^acompanamientos$/, "acompanamientos")
      .replace(/^bebidas$/, "bebidas")
      .replace(/^postres$/, "postres");

    // Reemplaza in-place los datos mock con los del backend
    function applyBackendSession(session) {
      RESTAURANT = {
        ...RESTAURANT,
        name: session.restaurant.name,
        ruc: session.restaurant.ruc,
        address: session.restaurant.address,
        tableNumber: session.table.number,
        backendId: session.restaurant.id,
        tableId: session.table.id,
        qrToken: session.table.qrToken,
        taxRate: session.restaurant.taxRate
      };

      // Reemplaza CATEGORIES
      CATEGORIES.length = 0;
      CATEGORIES.push({ id: "todo", name: "Todo" });
      for (const cat of session.categories) {
        CATEGORIES.push({ id: slugify(cat.name), name: cat.name, backendId: cat.id });
      }

      // Reemplaza MENU
      MENU.length = 0;
      for (const cat of session.categories) {
        const slug = slugify(cat.name);
        for (const item of cat.items) {
          MENU.push({
            id: item.id,
            cat: slug,
            name: item.name,
            desc: item.description,
            price: item.priceCents / 100,
            time: item.prepMinutes,
            popular: item.popular,
            recommended: item.recommended,
            spicy: item.spicy,
            calories: item.calories,
            tags: item.tags || [],
            img: item.imageUrl,
            fb: STATION_FALLBACK[item.kitchenStation] || { color: "#6B5D52", emoji: "🍽️" },
            backendId: item.id
          });
        }
      }
    }

    // Order Status — improved
    function OrderStatusScreen({ cart, setCart, onBack, onBill }) {
      // Auto-advance per-item kitchen status
      useEffect(() => {
        const flow = ["received", "preparing", "ready", "served"];
        const interval = setInterval(() => {
          setCart(prev => prev.map((it, idx) => {
            const cur = it.kitchenStatus || "received";
            const i = flow.indexOf(cur);
            if (i < flow.length - 1) {
              // Items advance at different speeds based on prep time
              const advanceProb = Math.min(0.4, (it.item.time || 10) / 60);
              if (Math.random() < advanceProb) {
                return { ...it, kitchenStatus: flow[i + 1] };
              }
            }
            return it;
          }));
        }, 3500);
        return () => clearInterval(interval);
      }, []);

      // Modification request handling
      const [modifyTarget, setModifyTarget] = useState(null);

      const submitModify = ({ reason, note }) => {
        const targetIdx = modifyTarget.idx;
        // Mark as pending
        setCart(prev => prev.map((c, i) => i === targetIdx ? { ...c, modRequest: { status: "pending", reason, note } } : c));
        setModifyTarget(null);

        // Simulate kitchen response after 3-4 seconds
        setTimeout(() => {
          setCart(prev => prev.map((c, i) => {
            if (i !== targetIdx) return c;
            const itemStatus = c.kitchenStatus || "received";
            // Logic: accepted if received or just preparing, more likely rejected if preparing > halfway
            const acceptable = itemStatus === "received" || (itemStatus === "preparing" && Math.random() > 0.4);
            return {
              ...c,
              modRequest: {
                ...c.modRequest,
                status: acceptable ? "accepted" : "rejected",
                kitchenNote: acceptable
                  ? (reason === "cancel" ? "Cancelado, no se cobrará." : reason === "qty" ? "Cantidad ajustada." : "Cambio aplicado.")
                  : (itemStatus === "preparing" ? "Lo sentimos, ya está cocinándose." : "No es posible cambiarlo en este punto.")
              }
            };
          }));
        }, 3500 + Math.random() * 1500);
      };

      const subtotal = cart.reduce((s, c) => s + c.item.price * c.qty, 0);
      const totalItems = cart.length;
      const readyItems = cart.filter(c => c.kitchenStatus === "ready" || c.kitchenStatus === "served").length;
      const allServed = cart.every(c => c.kitchenStatus === "served");
      const overallStage = allServed ? 3 : readyItems === totalItems ? 2 : cart.some(c => c.kitchenStatus === "preparing" || c.kitchenStatus === "ready") ? 1 : 0;
      const stages = ["Recibido", "Preparando", "Listo", "Servido"];
      const stageProgress = ((overallStage + 1) / stages.length) * 100;

      return (
        <div className="px-6 py-8 max-w-3xl mx-auto pb-32">
          <h1 className="font-display text-4xl font-semibold">Tu pedido en vivo</h1>
          <p className="text-muted mt-1">Mesa {RESTAURANT.tableNumber} · {cart.reduce((s,c) => s+c.qty,0)} platos · ETA {Math.max(2, 18 - overallStage * 5)} min</p>

          {/* Visual progress bar */}
          <div className="mt-6 bg-paper rounded-2xl shadow-soft border border-border overflow-hidden">
            <div className="px-6 py-5 bg-gradient-to-r from-clay/5 to-gold/5">
              <div className="flex items-center justify-between text-xs text-muted mb-2">
                <span className="font-medium">Progreso general</span>
                <span className="font-mono font-bold text-ink">{Math.round(stageProgress)}%</span>
              </div>
              <div className="h-2 bg-cream rounded-full overflow-hidden">
                <div className="h-full bg-gradient-to-r from-clay to-gold transition-all duration-1000 rounded-full" style={{ width: `${stageProgress}%` }}></div>
              </div>
              <div className="mt-4 grid grid-cols-4 gap-1">
                {stages.map((s, i) => (
                  <div key={s} className="text-center">
                    <div className={`w-7 h-7 mx-auto rounded-full flex items-center justify-center text-[11px] font-bold transition ${i < overallStage ? 'bg-olive text-white' : i === overallStage ? 'bg-clay text-white scale-110 shadow-card' : 'bg-cream border border-border text-muted'}`}>
                      {i < overallStage ? '✓' : i + 1}
                    </div>
                    <p className={`text-[10px] mt-1 font-medium ${i <= overallStage ? 'text-ink' : 'text-muted'}`}>{s}</p>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Per-item live tracking */}
          <div className="mt-6">
            <div className="flex items-center justify-between mb-3">
              <h2 className="font-display text-xl font-semibold">Cada plato en vivo</h2>
              <span className="text-xs text-muted font-medium">{readyItems}/{totalItems} listos</span>
            </div>
            <div className="space-y-3">
              {cart.map((c, i) => <ItemTracker key={i} ci={c} idx={i} onModify={() => setModifyTarget({ idx: i, ...c })} />)}
            </div>
          </div>

          <div className="mt-6 bg-paper rounded-2xl shadow-soft border border-border p-5">
            <div className="flex items-center justify-between">
              <span className="text-muted">Subtotal</span>
              <span className="font-display text-xl font-bold text-clay">{PEN(subtotal)}</span>
            </div>
          </div>

          <div className="mt-6 grid grid-cols-2 gap-3">
            <button onClick={onBack} className="py-4 bg-paper border border-border text-ink font-semibold rounded-full hover:border-charcoal transition">
              Pedir más platos
            </button>
            <button onClick={onBill} className="py-4 bg-clay hover:bg-clay-dark text-white font-semibold rounded-full transition">
              Pedir la cuenta
            </button>
          </div>

          <ModifySheet open={!!modifyTarget} item={modifyTarget} onClose={() => setModifyTarget(null)} onSubmit={submitModify} />
        </div>
      );
    }

    // Per-item tracker card
    function ItemTracker({ ci, idx, onModify }) {
      const status = ci.kitchenStatus || "received";
      const config = {
        received: { color: "muted", label: "En cola", desc: "La cocina lo ha recibido", dot: "bg-muted", barWidth: 15 },
        preparing: { color: "warn", label: "Preparándose", desc: "El chef está cocinando", dot: "bg-warn", barWidth: 60 },
        ready: { color: "sky", label: "Listo para servir", desc: "El mozo lo está llevando", dot: "bg-sky", barWidth: 90 },
        served: { color: "olive", label: "Servido", desc: "Disfruta tu plato", dot: "bg-olive", barWidth: 100 }
      }[status];
      const mod = ci.modRequest;
      const canModify = status !== "served" && (!mod || mod.status === "rejected");

      return (
        <div className="bg-paper border border-border rounded-2xl p-4">
          <div className="flex gap-3">
            <div className="w-16 h-16 rounded-xl overflow-hidden shrink-0">
              <FoodImage src={ci.item.img} fb={ci.item.fb} alt={ci.item.name} className="w-full h-full" />
            </div>
            <div className="flex-1 min-w-0">
              <div className="flex items-start justify-between gap-2">
                <p className="font-semibold text-sm leading-tight">
                  <span className="text-muted mr-1.5">{ci.qty}×</span>{ci.item.name}
                </p>
                <span className={`text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded-full bg-${config.color}/10 text-${config.color === 'olive' ? 'olive' : config.color === 'sky' ? 'sky' : config.color === 'warn' ? 'warn' : 'muted'} shrink-0`}>
                  {config.label}
                </span>
              </div>
              {ci.notes && <p className="text-xs text-muted italic mt-1 truncate">"{ci.notes}"</p>}

              <div className="mt-2.5 flex items-center gap-2">
                <div className="flex-1 h-1 bg-cream rounded-full overflow-hidden">
                  <div className={`h-full transition-all duration-1000 ${config.dot} ${status === 'preparing' ? 'shimmer' : ''}`} style={{ width: `${config.barWidth}%` }}></div>
                </div>
                <span className="text-[11px] text-muted font-medium w-10 text-right">{config.barWidth}%</span>
              </div>
              <p className="text-[11px] text-muted mt-1">{config.desc}</p>
            </div>
          </div>

          {/* Modification request status */}
          {mod && (
            <div className={`mt-3 p-3 rounded-xl border ${mod.status === 'pending' ? 'bg-warn/5 border-warn/30' : mod.status === 'accepted' ? 'bg-olive/5 border-olive/30' : 'bg-clay/5 border-clay/30'}`}>
              <div className="flex items-start gap-2">
                {mod.status === 'pending' && (
                  <>
                    <div className="w-5 h-5 rounded-full border-2 border-warn border-t-transparent animate-spin shrink-0 mt-0.5"></div>
                    <div className="flex-1">
                      <p className="text-xs font-semibold text-warn">Solicitud enviada · Esperando cocina...</p>
                      <p className="text-[11px] text-muted mt-0.5">{mod.note || "Modificación pedida"}</p>
                    </div>
                  </>
                )}
                {mod.status === 'accepted' && (
                  <>
                    <Icon name="check" size={16} className="text-olive shrink-0 mt-0.5" />
                    <div className="flex-1">
                      <p className="text-xs font-semibold text-olive">Cocina aceptó tu cambio</p>
                      <p className="text-[11px] text-muted mt-0.5">{mod.kitchenNote}</p>
                    </div>
                  </>
                )}
                {mod.status === 'rejected' && (
                  <>
                    <Icon name="info" size={16} className="text-clay shrink-0 mt-0.5" />
                    <div className="flex-1">
                      <p className="text-xs font-semibold text-clay">No se pudo aplicar</p>
                      <p className="text-[11px] text-muted mt-0.5">{mod.kitchenNote}</p>
                    </div>
                  </>
                )}
              </div>
            </div>
          )}

          <div className="mt-3 flex items-center gap-2">
            <button
              onClick={onModify}
              disabled={!canModify || (mod && mod.status === 'pending')}
              className={`flex-1 py-2 text-xs font-semibold rounded-lg border transition ${canModify && (!mod || mod.status === 'rejected') ? 'border-clay text-clay hover:bg-clay/5' : 'border-border text-muted cursor-not-allowed bg-cream'}`}
            >
              {mod && mod.status === 'pending' ? 'Solicitud pendiente' : mod && mod.status === 'accepted' ? '✓ Modificación aceptada' : 'Modificar plato'}
            </button>
          </div>
        </div>
      );
    }

    // Bill
    function BillScreen({ cart, tip, setTip, splitN, setSplitN, onBack, onBilling }) {
      const subtotal = cart.reduce((s, c) => s + c.item.price * c.qty, 0);
      const subtotalSinIGV = subtotal / (1 + IGV_RATE);
      const igvAmount = subtotal - subtotalSinIGV;
      const tipAmount = subtotal * (tip / 100);
      const total = subtotal + tipAmount;
      return (
        <div className="px-6 py-8 max-w-2xl mx-auto pb-32">
          <button onClick={onBack} className="inline-flex items-center gap-1 text-clay font-medium mb-4">
            <Icon name="chevronLeft" size={16} /> Volver
          </button>
          <h1 className="font-display text-4xl font-semibold">Tu cuenta</h1>
          <p className="text-muted mt-1">Mesa {RESTAURANT.tableNumber}</p>

          <div className="mt-6 bg-paper rounded-2xl shadow-soft border border-border p-6">
            {cart.map((c, i) => (
              <div key={i} className="flex justify-between py-3 border-b border-border last:border-0">
                <div className="flex gap-3">
                  <div className="w-12 h-12 rounded-lg overflow-hidden shrink-0">
                    <FoodImage src={c.item.img} fb={c.item.fb} alt={c.item.name} className="w-full h-full" />
                  </div>
                  <div>
                    <p className="font-semibold text-sm">{c.qty}× {c.item.name}</p>
                    <p className="text-xs text-muted mt-0.5">{PEN(c.item.price)} c/u</p>
                  </div>
                </div>
                <span className="font-display font-bold">{PEN(c.item.price * c.qty)}</span>
              </div>
            ))}
            <div className="pt-4 mt-4 space-y-2 text-sm border-t border-border">
              <div className="flex justify-between text-muted">
                <span>Op. gravadas</span>
                <span>{PEN(subtotalSinIGV)}</span>
              </div>
              <div className="flex justify-between text-muted">
                <span>IGV (18%)</span>
                <span>{PEN(igvAmount)}</span>
              </div>
              <div className="flex justify-between font-bold pt-2 border-t border-border">
                <span>Subtotal</span>
                <span>{PEN(subtotal)}</span>
              </div>
            </div>
          </div>

          <div className="mt-5 bg-paper rounded-2xl shadow-soft border border-border p-5">
            <div className="flex items-center justify-between mb-3">
              <p className="font-semibold">Propina al equipo</p>
              <p className="text-xs text-muted">Cobra el restaurante para repartir</p>
            </div>
            <div className="flex gap-2">
              {[0, 5, 10, 15].map(p => (
                <button key={p} onClick={() => setTip(p)} className={`flex-1 py-3 rounded-xl text-sm font-semibold transition ${tip === p ? 'bg-charcoal text-white' : 'bg-cream border border-border text-ink'}`}>
                  {p === 0 ? 'No' : `${p}%`}
                </button>
              ))}
            </div>
          </div>

          <div className="mt-5 bg-paper rounded-2xl shadow-soft border border-border p-5">
            <p className="font-semibold mb-3">Dividir cuenta</p>
            <div className="flex items-center justify-between">
              <span className="text-sm text-muted">Entre</span>
              <div className="inline-flex items-center bg-cream border border-border rounded-full">
                <button onClick={() => setSplitN(Math.max(1, splitN - 1))} className="w-10 h-10 flex items-center justify-center text-clay">
                  <Icon name="minus" size={16} />
                </button>
                <span className="w-10 text-center font-bold">{splitN}</span>
                <button onClick={() => setSplitN(splitN + 1)} className="w-10 h-10 flex items-center justify-center text-clay">
                  <Icon name="plus" size={16} />
                </button>
              </div>
              <span className="text-sm text-muted">{splitN > 1 ? 'personas' : 'persona'}</span>
            </div>
            {splitN > 1 && (
              <p className="mt-3 text-center text-sm">
                Cada uno paga: <span className="font-display font-bold text-clay text-xl">{PEN(total / splitN)}</span>
              </p>
            )}
          </div>

          <div className="mt-6 bg-charcoal text-white rounded-2xl p-6">
            <div className="flex justify-between text-base">
              <span className="opacity-80">Subtotal</span>
              <span>{PEN(subtotal)}</span>
            </div>
            {tip > 0 && (
              <div className="flex justify-between text-sm opacity-70 mt-1">
                <span>Propina ({tip}%)</span>
                <span>{PEN(tipAmount)}</span>
              </div>
            )}
            <div className="flex justify-between font-display text-3xl font-bold mt-3 pt-3 border-t border-white/15">
              <span>Total</span>
              <span>{PEN(total)}</span>
            </div>
          </div>

          <button onClick={onBilling} className="w-full mt-6 py-5 bg-clay hover:bg-clay-dark text-white text-lg font-semibold rounded-full shadow-card transition">
            Continuar al pago
          </button>
        </div>
      );
    }

    function Field({ label, value, onChange, placeholder, type = "text", maxLength, pattern }) {
      return (
        <div>
          <label className="text-sm font-semibold">{label}</label>
          <input
            type={type}
            value={value}
            onChange={(e) => onChange(e.target.value)}
            placeholder={placeholder}
            maxLength={maxLength}
            pattern={pattern}
            className="mt-1.5 w-full px-4 py-3 bg-cream border border-border rounded-xl text-sm focus:outline-none focus:border-clay focus:bg-paper transition"
          />
        </div>
      );
    }

    // Billing
    function BillingScreen({ total, onBack, onPay }) {
      const [type, setType] = useState("boleta");
      const [doc, setDoc] = useState("");
      const [name, setName] = useState("");
      const [address, setAddress] = useState("");
      const [email, setEmail] = useState("");
      const [error, setError] = useState("");

      const validate = () => {
        if (type === "factura") {
          if (!/^\d{11}$/.test(doc)) return setError("El RUC debe tener 11 dígitos") || false;
          if (!name.trim()) return setError("Ingresa la razón social") || false;
          if (!address.trim()) return setError("Ingresa la dirección fiscal") || false;
        } else if (type === "boleta") {
          if (total > 700 && !/^\d{8}$/.test(doc)) return setError("Boleta > S/ 700: DNI obligatorio") || false;
          if (doc && !/^\d{8}$/.test(doc)) return setError("DNI debe tener 8 dígitos") || false;
        }
        if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return setError("Email inválido") || false;
        setError("");
        return true;
      };

      return (
        <div className="px-6 py-8 max-w-2xl mx-auto pb-32">
          <button onClick={onBack} className="inline-flex items-center gap-1 text-clay font-medium mb-4">
            <Icon name="chevronLeft" size={16} /> Volver
          </button>
          <h1 className="font-display text-4xl font-semibold">Comprobante</h1>
          <p className="text-muted mt-1">Total a pagar: <span className="font-bold text-clay">{PEN(total)}</span></p>

          <div className="mt-6 bg-paper rounded-2xl shadow-soft border border-border p-6">
            <p className="font-semibold mb-3">Tipo de comprobante</p>
            <div className="grid grid-cols-3 gap-3">
              {[
                { id: 'boleta', title: 'Boleta', sub: 'Consumidor final' },
                { id: 'factura', title: 'Factura', sub: 'Con RUC' },
                { id: 'ticket', title: 'Ticket', sub: 'Sin datos' }
              ].map(opt => (
                <button key={opt.id} onClick={() => setType(opt.id)} className={`p-4 rounded-2xl border-2 text-left transition ${type === opt.id ? 'border-clay bg-clay/5' : 'border-border bg-cream'}`}>
                  <p className="font-semibold">{opt.title}</p>
                  <p className="text-xs text-muted mt-0.5">{opt.sub}</p>
                </button>
              ))}
            </div>

            {type === 'factura' && (
              <div className="mt-5 space-y-3 anim-fade-in">
                <Field label="RUC" value={doc} onChange={setDoc} placeholder="11 dígitos" maxLength={11} />
                <Field label="Razón social" value={name} onChange={setName} placeholder="Empresa S.A.C." />
                <Field label="Dirección fiscal" value={address} onChange={setAddress} placeholder="Av. ..." />
                <Field label="Email" value={email} onChange={setEmail} placeholder="contacto@empresa.com" type="email" />
                <p className="text-xs text-muted">Validamos el RUC contra SUNAT al emitir el comprobante.</p>
              </div>
            )}
            {type === 'boleta' && (
              <div className="mt-5 space-y-3 anim-fade-in">
                <Field label={`DNI ${total > 700 ? '(obligatorio)' : '(opcional)'}`} value={doc} onChange={setDoc} placeholder="8 dígitos" maxLength={8} />
                <Field label="Nombres y apellidos (opcional)" value={name} onChange={setName} placeholder="Tu nombre" />
                <Field label="Email (te enviamos la boleta)" value={email} onChange={setEmail} placeholder="tu@email.com" type="email" />
                {total > 700 && <p className="text-xs text-clay bg-clay/5 border border-clay/20 p-3 rounded-xl">SUNAT exige DNI para boletas mayores a S/ 700.</p>}
              </div>
            )}
            {type === 'ticket' && (
              <p className="mt-5 text-sm text-muted bg-cream p-4 rounded-xl border border-border">El ticket no es válido para crédito fiscal ni gastos deducibles. Si los necesitas, elige boleta o factura.</p>
            )}

            {error && <p className="mt-4 text-sm text-clay bg-clay/5 border border-clay/20 p-3 rounded-xl">{error}</p>}
          </div>

          <button
            onClick={() => { if (validate()) onPay({ type, doc, name, address, email }); }}
            className="w-full mt-6 py-5 bg-clay hover:bg-clay-dark text-white text-lg font-semibold rounded-full shadow-card transition"
          >
            Continuar al pago
          </button>
          <p className="text-center text-xs text-muted mt-3">
            Tus datos se procesan según la Ley N° 29733 de Protección de Datos.
          </p>
        </div>
      );
    }

    // Payment
    function PaymentScreen({ total, billingData, onBack, onSuccess }) {
      const [method, setMethod] = useState(null);
      const [processing, setProcessing] = useState(false);
      const methods = [
        { id: 'yape', name: 'Yape', desc: 'Escanea el QR con tu app', color: '#9333EA' },
        { id: 'plin', name: 'Plin', desc: 'Pago directo desde tu banco', color: '#0EA5E9' },
        { id: 'card', name: 'Tarjeta', desc: 'Visa, Mastercard, Amex', color: '#1F1A17' },
        { id: 'cash', name: 'Efectivo', desc: 'El mozo se acercará a cobrar', color: '#2D7D5A' }
      ];
      const handlePay = (m) => { setMethod(m); setProcessing(true); setTimeout(() => onSuccess(m), 2200); };

      if (processing) {
        return (
          <div className="h-full flex flex-col items-center justify-center px-8">
            <div className="w-20 h-20 rounded-full flex items-center justify-center text-3xl font-bold text-white" style={{ background: method.color }}>
              {method.name[0]}
            </div>
            <h2 className="font-display text-2xl font-semibold mt-6">Procesando con {method.name}</h2>
            <p className="text-muted mt-1">No cierres la tablet, esto toma unos segundos.</p>
            <div className="mt-8 w-64 h-1 bg-border rounded-full overflow-hidden">
              <div className="h-full bg-clay shimmer" style={{ width: '70%' }}></div>
            </div>
          </div>
        );
      }

      return (
        <div className="px-6 py-8 max-w-2xl mx-auto pb-32">
          <button onClick={onBack} className="inline-flex items-center gap-1 text-clay font-medium mb-4">
            <Icon name="chevronLeft" size={16} /> Volver
          </button>
          <h1 className="font-display text-4xl font-semibold">Método de pago</h1>
          <p className="text-muted mt-1">Total: <span className="font-display text-2xl font-bold text-clay">{PEN(total)}</span></p>

          <div className="mt-6 grid grid-cols-2 gap-4">
            {methods.map(m => (
              <button
                key={m.id}
                onClick={() => handlePay(m)}
                className="p-6 rounded-2xl bg-paper border border-border hover:shadow-card text-left transition group"
              >
                <div className="w-12 h-12 rounded-xl flex items-center justify-center text-white font-bold text-lg" style={{ background: m.color }}>
                  {m.name[0]}
                </div>
                <p className="font-display text-2xl font-semibold mt-4">{m.name}</p>
                <p className="text-xs text-muted mt-1">{m.desc}</p>
                <div className="mt-4 inline-flex items-center gap-1 text-xs font-semibold text-clay opacity-0 group-hover:opacity-100 transition">
                  Pagar <Icon name="chevronRight" size={12} />
                </div>
              </button>
            ))}
          </div>

          <div className="mt-8 bg-paper rounded-2xl border border-border p-5">
            <h3 className="font-semibold mb-3">Resumen del comprobante</h3>
            <div className="text-sm text-muted space-y-1">
              <p>Tipo: <span className="font-semibold text-ink uppercase">{billingData.type}</span></p>
              {billingData.doc && <p>{billingData.type === 'factura' ? 'RUC' : 'DNI'}: <span className="font-semibold text-ink">{billingData.doc}</span></p>}
              {billingData.name && <p>{billingData.type === 'factura' ? 'Razón social' : 'Nombre'}: <span className="font-semibold text-ink">{billingData.name}</span></p>}
              {billingData.email && <p>Enviar a: <span className="font-semibold text-ink">{billingData.email}</span></p>}
            </div>
          </div>
        </div>
      );
    }

    // Success — premium celebratory
    function SuccessScreen({ paymentMethod, total, billingData, onSurvey }) {
      const serial = (billingData.type === 'factura' ? 'F001-' : 'B001-') + String(Math.floor(Math.random() * 99999)).padStart(5, '0');
      return (
        <div className="success-screen">
          {/* Ambient orbs */}
          <div className="success-orb success-orb-1"></div>
          <div className="success-orb success-orb-2"></div>
          <div className="success-orb success-orb-3"></div>

          <div className="relative z-10 px-6 py-12 max-w-xl mx-auto">
            {/* Hero check icon with glow */}
            <div className="text-center anim-pop">
              <div className="success-check-wrap">
                <div className="success-check">
                  <Icon name="check" size={42} />
                </div>
                <div className="success-check-ring success-check-ring-1"></div>
                <div className="success-check-ring success-check-ring-2"></div>
              </div>

              <span className="success-eyebrow">
                <span className="success-eyebrow-dot"></span>
                Comprobante {serial}
              </span>
              <h1 className="font-display text-5xl font-semibold mt-4 leading-tight">
                ¡Gracias por <em className="welcome-accent">tu visita!</em>
              </h1>
              <p className="text-muted mt-3 text-base">Tu pago se procesó correctamente. Vuelve pronto.</p>
            </div>

            {/* Premium receipt card with glass effect */}
            <div className="success-receipt mt-8">
              <div className="success-receipt-header">
                <div>
                  <p className="text-[10px] uppercase tracking-[0.18em] opacity-60">Comprobante electrónico</p>
                  <p className="font-display text-lg font-semibold mt-0.5">{billingData.type === 'factura' ? 'Factura' : billingData.type === 'boleta' ? 'Boleta de Venta' : 'Ticket'}</p>
                </div>
                <p className="font-mono text-sm font-bold opacity-90">{serial}</p>
              </div>

              <div className="success-receipt-body">
                <p className="font-display text-xl font-bold">{RESTAURANT.name}</p>
                <p className="text-xs text-muted mt-0.5">RUC {RESTAURANT.ruc}</p>
                <p className="text-xs text-muted">{RESTAURANT.address}</p>

                <div className="success-divider"></div>

                <div className="grid grid-cols-2 gap-4">
                  <div>
                    <p className="text-[10px] text-muted uppercase tracking-wider">Mesa</p>
                    <p className="font-semibold">{RESTAURANT.tableNumber}</p>
                  </div>
                  <div>
                    <p className="text-[10px] text-muted uppercase tracking-wider">Pagado con</p>
                    <p className="font-semibold">{paymentMethod.name}</p>
                  </div>
                </div>

                <div className="success-total-block mt-5">
                  <p className="text-[10px] uppercase tracking-[0.18em] opacity-70">Total pagado</p>
                  <p className="font-display text-4xl font-bold mt-1">{PEN(total)}</p>
                </div>

                <div className="mt-5 flex items-center gap-4 p-3 bg-cream rounded-xl border border-border">
                  <div className="w-16 h-16 grid grid-cols-5 gap-px bg-charcoal p-1 rounded">
                    {[...Array(25)].map((_, i) => (
                      <div key={i} style={{ background: Math.random() > 0.45 ? 'white' : '#1F1A17' }} />
                    ))}
                  </div>
                  <div className="text-[11px] flex-1">
                    <p className="font-semibold text-olive inline-flex items-center gap-1">
                      <Icon name="check" size={11} /> Validado por SUNAT
                    </p>
                    <p className="text-muted mt-0.5">Vía OSE Nubefact</p>
                    <p className="text-muted font-mono">Hash 7E4A...B3F2</p>
                  </div>
                </div>
              </div>
            </div>

            {billingData.email && (
              <p className="text-center text-sm text-muted mt-5">
                <Icon name="info" size={12} className="inline mr-1" />
                Enviamos copia a <span className="font-semibold text-ink">{billingData.email}</span>
              </p>
            )}

            <button onClick={onSurvey} className="welcome-cta mt-8" style={{ width: "100%", justifyContent: "center" }}>
              <Icon name="star" size={18} />
              <span>Calificar mi experiencia</span>
            </button>
            <button className="w-full mt-3 py-3 text-sm text-muted hover:text-ink transition">
              Libro de Reclamaciones (INDECOPI)
            </button>
          </div>
        </div>
      );
    }

    function SurveyScreen({ onFinish }) {
      const [stars, setStars] = useState(0);
      const [comment, setComment] = useState("");
      return (
        <div className="px-6 py-8 max-w-xl mx-auto text-center pb-32">
          <h1 className="font-display text-4xl font-semibold">¿Qué tal estuvo?</h1>
          <p className="text-muted mt-2">Tu opinión nos ayuda a seguir mejorando.</p>

          <div className="flex justify-center gap-1 mt-10">
            {[1,2,3,4,5].map(n => (
              <button key={n} onClick={() => setStars(n)} className="p-2">
                <Icon name="star" size={48} className={n <= stars ? "fill-gold text-gold" : "text-border"} />
              </button>
            ))}
          </div>

          {stars > 0 && (
            <div className="mt-6 anim-fade-in">
              <textarea
                value={comment}
                onChange={(e) => setComment(e.target.value)}
                placeholder="Cuéntanos más (opcional)..."
                rows={4}
                className="w-full p-4 bg-paper border border-border rounded-xl text-sm focus:outline-none focus:border-clay"
              />
              {stars >= 4 && (
                <p className="text-sm text-muted mt-3">¿Te gustaría dejar una reseña en Google? Te tomará 30 segundos.</p>
              )}
              <button onClick={onFinish} className="w-full mt-5 py-5 bg-olive hover:bg-olive/90 text-white text-lg font-semibold rounded-full shadow-card transition">
                Enviar y finalizar
              </button>
            </div>
          )}
          <button onClick={onFinish} className="mt-6 text-muted underline text-sm">Saltar</button>
        </div>
      );
    }

    // Call waiter
    function CallWaiterModal({ open, onClose, onConfirm }) {
      const reasons = [
        { id: 'ayuda', label: 'Necesito ayuda' },
        { id: 'servilletas', label: 'Más servilletas' },
        { id: 'bebida', label: 'Repetir bebida' },
        { id: 'cuenta', label: 'Pedir la cuenta' },
        { id: 'queja', label: 'Tengo una queja' },
        { id: 'otro', label: 'Otro motivo' }
      ];
      if (!open) return null;
      return (
        <div className="fixed inset-0 z-50 bg-charcoal/40 anim-fade-in flex items-center justify-center p-6" onClick={onClose}>
          <div onClick={(e) => e.stopPropagation()} className="bg-cream rounded-3xl p-6 max-w-md w-full anim-pop">
            <div className="text-center">
              <div className="w-14 h-14 mx-auto rounded-full bg-clay flex items-center justify-center text-white">
                <Icon name="bell" size={26} />
              </div>
              <h2 className="font-display text-2xl font-semibold mt-3">Llamar al mozo</h2>
              <p className="text-sm text-muted">Selecciona el motivo</p>
            </div>
            <div className="grid grid-cols-2 gap-2 mt-5">
              {reasons.map(r => (
                <button
                  key={r.id}
                  onClick={() => onConfirm(r)}
                  className="p-3 bg-paper border border-border hover:border-clay hover:bg-clay/5 rounded-xl text-sm font-medium transition"
                >
                  {r.label}
                </button>
              ))}
            </div>
            <button onClick={onClose} className="w-full mt-4 py-3 text-sm text-muted">Cancelar</button>
          </div>
        </div>
      );
    }

    function Toast({ message, show }) {
      if (!show) return null;
      return (
        <div className="fixed bottom-24 left-1/2 -translate-x-1/2 z-[60] anim-pop">
          <div className="inline-flex items-center gap-2 px-5 py-3 bg-charcoal text-white rounded-full shadow-float font-medium text-sm">
            <Icon name="check" size={16} className="text-olive" />
            {message}
          </div>
        </div>
      );
    }

    function CallWaiterFAB({ onClick, called }) {
      return (
        <button
          onClick={onClick}
          className={`waiter-fab ${called ? 'waiter-fab-called' : ''}`}
          title="Llamar al mozo"
          aria-label="Llamar al mozo"
        >
          <span className="waiter-fab-icon">
            <Icon name={called ? "check" : "bell"} size={20} />
          </span>
          <span className="waiter-fab-label">
            {called ? "Mozo en camino" : "Llamar al mozo"}
          </span>
          {!called && <span className="waiter-fab-pulse"></span>}
        </button>
      );
    }

    // ─────────────────────────── APP ───────────────────────────
    function App() {
      const [screen, setScreen] = useState("welcome");
      const [selectedItem, setSelectedItem] = useState(null);
      const [cart, setCart] = useState([]);
      const [favorites, setFavorites] = useState([]);
      const [cartOpen, setCartOpen] = useState(false);
      const [waiterOpen, setWaiterOpen] = useState(false);
      const [waiterCalled, setWaiterCalled] = useState(false);
      const [tip, setTip] = useState(10);
      const [splitN, setSplitN] = useState(1);
      const [billingData, setBillingData] = useState(null);
      const [paymentMethod, setPaymentMethod] = useState(null);
      const [toast, setToast] = useState(null);

      // Backend integration state
      const [backendStatus, setBackendStatus] = useState("connecting"); // connecting | online | offline
      const [orderId, setOrderId] = useState(null);
      const [dataVersion, setDataVersion] = useState(0);
      const [servingMode, setServingMode] = useState("asReady"); // together | asReady

      // Fetch backend session on mount
      useEffect(() => {
        const params = new URLSearchParams(location.search);
        const qr = params.get("qr") || "demo";
        const api = window.MesaSmartAPI;
        if (!api || !api.isConfigured()) {
          setBackendStatus("offline");
          return;
        }
        api.public.session(qr)
          .then(session => {
            applyBackendSession(session);
            setBackendStatus("online");
            setDataVersion(v => v + 1);
            console.log("[MesaSmart] Backend conectado:", session.restaurant.name, "· Mesa", session.table.number);
          })
          .catch(err => {
            console.warn("[MesaSmart] Backend no disponible, usando datos demo:", err.message);
            setBackendStatus("offline");
          });
      }, []);

      const showToast = (m) => { setToast(m); setTimeout(() => setToast(null), 1800); };
      const addToCart = (item, qty, notes) => {
        setCart(prev => [...prev, { item, qty, notes }]);
        showToast(`${item.name} agregado`);
      };
      const updateQty = (idx, qty) => {
        if (qty === 0) setCart(prev => prev.filter((_, i) => i !== idx));
        else setCart(prev => prev.map((c, i) => i === idx ? { ...c, qty } : c));
      };
      const toggleFav = (id) => setFavorites(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
      const callWaiter = async (reason) => {
        setWaiterOpen(false); setWaiterCalled(true);
        showToast(`Mozo notificado: ${reason.label}`);
        setTimeout(() => setWaiterCalled(false), 8000);
        // Backend: notifica al mozo real
        if (backendStatus === "online" && RESTAURANT.qrToken) {
          try { await window.MesaSmartAPI.public.callWaiter(RESTAURANT.qrToken, reason.label, reason.id === "queja"); }
          catch (e) { console.warn("Call waiter backend error:", e.message); }
        }
      };
      const submitOrder = async () => {
        // Si backend está online, persiste la orden ahí
        if (backendStatus === "online" && RESTAURANT.qrToken && cart.length > 0) {
          try {
            const servingNote = servingMode === "together"
              ? "[Servir todo junto]"
              : "[Servir según salgan]";
            const order = await window.MesaSmartAPI.public.createOrder(
              RESTAURANT.qrToken,
              splitN || 1,
              cart.map(c => ({
                menuItemId: c.item.backendId || c.item.id,
                qty: c.qty,
                notes: [servingNote, c.notes].filter(Boolean).join(" · "),
                course: "MAIN"
              }))
            );
            setOrderId(order.id);
            showToast(`Pedido #${order.id.slice(-6)} enviado a cocina`);
            // Suscribe a updates en vivo
            const sock = window.MesaSmartAPI.socket();
            if (sock) sock.emit("subscribe:order", order.id);
          } catch (e) {
            console.warn("Order backend error:", e.message);
            showToast("Pedido guardado localmente (sin conexión)");
          }
        }
        setCartOpen(false);
        setScreen("orderStatus");
      };

      const subtotal = cart.reduce((s, c) => s + c.item.price * c.qty, 0);
      const total = subtotal * (1 + tip / 100);
      const cartCount = cart.reduce((s, c) => s + c.qty, 0);

      if (screen === "welcome") return <WelcomeScreen onStart={() => setScreen("menu")} />;

      return (
        <div className="min-h-full">
          <Header tableNumber={RESTAURANT.tableNumber} onHome={() => setScreen("menu")} favCount={favorites.length} onFavs={() => setScreen("menu")} />

          {screen === "menu" && <MenuScreen onItem={setSelectedItem} favorites={favorites} onFav={toggleFav} />}
          {screen === "orderStatus" && <OrderStatusScreen cart={cart} setCart={setCart} onBack={() => setScreen("menu")} onBill={() => setScreen("bill")} />}
          {screen === "bill" && <BillScreen cart={cart} tip={tip} setTip={setTip} splitN={splitN} setSplitN={setSplitN} onBack={() => setScreen("orderStatus")} onBilling={() => setScreen("billing")} />}
          {screen === "billing" && <BillingScreen total={total} onBack={() => setScreen("bill")} onPay={(d) => { setBillingData(d); setScreen("payment"); }} />}
          {screen === "payment" && <PaymentScreen total={total} billingData={billingData} onBack={() => setScreen("billing")} onSuccess={(m) => { setPaymentMethod(m); setScreen("success"); }} />}
          {screen === "success" && <SuccessScreen paymentMethod={paymentMethod} total={total} billingData={billingData} onSurvey={() => setScreen("survey")} />}
          {screen === "survey" && <SurveyScreen onFinish={() => {
            showToast("¡Gracias por tu visita!");
            setTimeout(() => {
              setCart([]); setFavorites([]); setBillingData(null); setPaymentMethod(null);
              setScreen("welcome");
            }, 1500);
          }} />}

          <DetailSheet item={selectedItem} onClose={() => setSelectedItem(null)} onAdd={addToCart} isFav={selectedItem && favorites.includes(selectedItem.id)} onFav={toggleFav} />
          <CartSheet open={cartOpen} onClose={() => setCartOpen(false)} cart={cart} updateQty={updateQty} onCheckout={submitOrder} onCallWaiter={() => { setCartOpen(false); setWaiterOpen(true); }} servingMode={servingMode} setServingMode={setServingMode} />
          <CallWaiterModal open={waiterOpen} onClose={() => setWaiterOpen(false)} onConfirm={callWaiter} />

          {screen === "menu" && <CartBar count={cartCount} total={subtotal} onClick={() => setCartOpen(true)} />}
          {screen !== "success" && screen !== "survey" && <CallWaiterFAB onClick={() => setWaiterOpen(true)} called={waiterCalled} />}

          {/* Indicador discreto de conexión backend */}
          <div className="fixed top-2 right-2 z-50 inline-flex items-center gap-1.5 px-2.5 py-1 bg-paper/80 backdrop-blur border border-border rounded-full text-[10px] font-medium" title={backendStatus === "online" ? "Conectado al backend en vivo" : backendStatus === "connecting" ? "Conectando..." : "Modo demo offline"}>
            <span className={`w-1.5 h-1.5 rounded-full ${backendStatus === "online" ? "bg-olive" : backendStatus === "connecting" ? "bg-warn animate-pulse" : "bg-muted"}`}></span>
            <span className="text-muted">{backendStatus === "online" ? "Live" : backendStatus === "connecting" ? "..." : "Demo"}</span>
          </div>

          <Toast message={toast} show={!!toast} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
