        check: <polyline points="20 6 9 17 4 12" />,
        chevronRight: <polyline points="9 18 15 12 9 6" />,
        chevronLeft: <polyline points="15 18 9 12 15 6" />,
        chevronDown: <polyline points="6 9 12 15 18 9" />,
        search: <><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></>,
        alert: <><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" /><line x1="12" y1="9" x2="12" y2="13" /><line x1="12" y1="17" x2="12" y2="17" /></>,
        sparkle: <><path d="M12 2l1.5 4.5L18 8l-4.5 1.5L12 14l-1.5-4.5L6 8l4.5-1.5L12 2z" /><path d="M5 15l1 3 3 1-3 1-1 3-1-3-3-1 3-1 1-3z" /></>,
        trendUp: <><polyline points="23 6 13.5 15.5 8.5 10.5 1 18" /><polyline points="17 6 23 6 23 12" /></>,
        trendDown: <><polyline points="23 18 13.5 8.5 8.5 13.5 1 6" /><polyline points="17 18 23 18 23 12" /></>,
        cash: <><rect x="2" y="6" width="20" height="12" rx="2" /><circle cx="12" cy="12" r="2" /></>,
        star: <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />,
        gift: <><polyline points="20 12 20 22 4 22 4 12" /><rect x="2" y="7" width="20" height="5" /><line x1="12" y1="22" x2="12" y2="7" /><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z" /><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z" /></>,
        users: <><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /></>,
        package: <><line x1="16.5" y1="9.4" x2="7.5" y2="4.21" /><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" /><polyline points="3.27 6.96 12 12.01 20.73 6.96" /><line x1="12" y1="22.08" x2="12" y2="12" /></>,
        playCircle: <><circle cx="12" cy="12" r="10" /><polygon points="10 8 16 12 10 16 10 8" /></>,
        edit: <><path d="M12 20h9" /><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" /></>,
        refresh: <><polyline points="23 4 23 10 17 10" /><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" /></>
      };
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          {ics[name]}
        </svg>
      );
    };

    // ─────────────────────── COMPONENTS ───────────────────────

    function Sidebar({ active, setActive }) {
      const sections = [
        { id: "resumen", label: "Resumen", icon: "home", group: "today" },
        { id: "alertas", label: "Alertas", icon: "alert", badge: 7, group: "today" },
        { id: "inventario", label: "Inventario", icon: "box", group: "operar" },
        { id: "conteo", label: "Conteo físico", icon: "camera", group: "operar" },
        { id: "conversiones", label: "Conversiones", icon: "refresh", group: "operar" },
        { id: "recetas", label: "Recetas", icon: "chef", group: "operar" },
        { id: "proveedores", label: "Proveedores", icon: "truck", group: "comprar" },
        { id: "recepcion", label: "Recepción guías", icon: "package", group: "comprar" },
        { id: "compras", label: "Pedidos", icon: "package", group: "comprar" },
        { id: "caducidad", label: "Caducidad", icon: "clock", group: "comprar" },
        { id: "pnl", label: "P&L", icon: "chart", group: "analizar" },
        { id: "campanas", label: "Campañas IA", icon: "sparkle", group: "analizar" },
        { id: "plan", label: "Plan", icon: "edit", group: "ajustes" }
      ];
      const groups = {
        today: "HOY",
        operar: "OPERAR",
        comprar: "COMPRAR",
        analizar: "ANALIZAR",
        ajustes: "AJUSTES"
      };
      const grouped = {};
      for (const s of sections) {
        if (!grouped[s.group]) grouped[s.group] = [];
        grouped[s.group].push(s);
      }
      return (
        <aside className="w-60 bg-charcoal text-cream p-4 flex flex-col h-screen sticky top-0">
          <div className="flex items-center gap-3 mb-6 px-2">
            <div className="w-10 h-10 bg-clay rounded-xl flex items-center justify-center font-bold text-sm">LB</div>
            <div>
              <p className="font-display text-lg font-semibold leading-tight">La Brasa</p>
              <p className="text-[11px] text-cream/50">ERP · Miraflores</p>
            </div>
          </div>
          <nav className="flex-1 space-y-4">
            {Object.entries(groups).map(([gid, gname]) => (
              <div key={gid}>
                <p className="text-[10px] uppercase tracking-wider text-cream/40 font-bold px-3 mb-1.5">{gname}</p>
                {grouped[gid]?.map(s => (
                  <button
                    key={s.id}
                    onClick={() => setActive(s.id)}
                    className={`w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition ${active === s.id ? 'bg-clay text-white' : 'text-cream/70 hover:bg-cream/5 hover:text-cream'}`}
                  >
                    <Icon name={s.icon} size={16} />
                    <span className="flex-1 text-left">{s.label}</span>
                    {s.badge > 0 && <span className="bg-danger text-white text-[10px] font-bold rounded-full w-4 h-4 flex items-center justify-center">{s.badge}</span>}
                  </button>
                ))}
              </div>
            ))}
          </nav>
          <div className="border-t border-cream/10 pt-3 mt-3">
            <div className="flex items-center gap-3 px-2 py-2">
              <div className="w-9 h-9 rounded-full bg-gold flex items-center justify-center font-bold text-charcoal">M</div>
              <div className="flex-1 min-w-0">
                <p className="text-sm font-semibold truncate">{ME.name}</p>
                <p className="text-[11px] text-cream/50">{ME.role}</p>
              </div>
            </div>
            <a href="admin.html" className="text-[11px] text-cream/40 hover:text-cream/70 px-2">← Volver al panel</a>
          </div>
        </aside>
      );
    }

    function HeroKpi({ label, value, sub, accent = "clay", icon, trend, animate = true }) {
      const colors = {
        clay: "bg-clay/5 border-clay/20 text-clay",
        olive: "bg-olive/5 border-olive/20 text-olive",
        gold: "bg-gold/10 border-gold/30 text-gold",
        danger: "bg-danger/5 border-danger/20 text-danger",
        sky: "bg-sky/5 border-sky/20 text-sky"
      };
      const numericVal = parseFloat(value);
      const isNumeric = !isNaN(numericVal);
      const displayValue = animate && isNumeric ? useCountUp(numericVal, 800) : value;
      const formattedValue = animate && isNumeric ? (numericVal >= 100000 ? `S/ ${(displayValue/100000).toFixed(1)}k` : `S/ ${displayValue.toFixed(0)}`) : value;

      return (
        <div className={`rounded-2xl border-2 p-5 ${colors[accent]} lift-on-hover`}>
          <div className="flex items-start justify-between mb-2">
            <p className="text-xs font-bold uppercase tracking-wider opacity-80">{label}</p>
            {icon && (
              <div className="w-8 h-8 rounded-lg bg-current/10 flex items-center justify-center icon-scale">
                <Icon name={icon} size={16} />
              </div>
            )}
          </div>
          <p className="font-display text-3xl font-bold text-ink leading-tight count-up">{animate && isNumeric ? formattedValue : value}</p>
          {sub && <p className="text-xs text-muted mt-1">{sub}</p>}
          {trend && (
            <div className="mt-2 inline-flex items-center gap-1 text-xs font-bold">
              <Icon name={trend.up ? "trendUp" : "trendDown"} size={12} />
              {trend.text}
            </div>
          )}
        </div>
      );
    }

    function StockBar({ percent, status }) {
      const gradients = {
        critical: "linear-gradient(90deg, #DC2626 0%, #ef4444 100%)",
        low: "linear-gradient(90deg, #D97706 0%, #f59e0b 100%)",
        ok: "linear-gradient(90deg, #2D7D5A 0%, #10b981 100%)"
      };
      const gradient = gradients[status] || gradients.ok;
      return (
        <div className="h-2 bg-cream rounded-full overflow-hidden">
          <div
            className="h-full rounded-full transition-all grow-bar shimmer-bar"
            style={{ width: `${percent}%`, background: gradient, backgroundSize: '200% 100%' }}
          ></div>
        </div>
      );
    }

    // ─────────────────────── RESUMEN ───────────────────────
    function Resumen({ ingredients }) {
      const totalValueCents = ingredients.reduce((s, i) => s + Math.round(i.current * i.costCents), 0);
      const critical = ingredients.filter(i => stockStatus(i).code === "critical").length;
      const low = ingredients.filter(i => stockStatus(i).code === "low").length;
      const expiring = ingredients.filter(i => i.trackExpiration && i.expDays <= 3).length;
      const todayRevenue = 968400;
      const todayCogs = 305800;
      const todayMargin = todayRevenue - todayCogs;
      const marginPct = (todayMargin / (todayRevenue / 1.18)) * 100;

      return (
        <div className="space-y-6">
          <div className="flex items-center justify-between">
            <div>
              <h1 className="font-display text-3xl font-semibold flex items-center gap-3">
                <div className="w-12 h-12 rounded-full bg-gradient-to-br from-gold to-clay text-white font-bold text-lg flex items-center justify-center shadow-card">MV</div>
                ¡Buenos días, Marcos!
              </h1>
              <p className="text-muted mt-1">Esto es lo que necesitas saber del negocio hoy.</p>
            </div>
          </div>

          {/* Top hero KPIs */}
          <div className="grid grid-cols-4 gap-4">
            <HeroKpi label="Ventas hoy" value={PEN(todayRevenue)} icon="cash" accent="clay" trend={{ up: true, text: "+12.4% vs ayer" }} />
            <HeroKpi label="Margen" value={`${marginPct.toFixed(1)}%`} sub={PEN(todayMargin)} icon="trendUp" accent="olive" />
            <HeroKpi label="Valor inventario" value={PEN(totalValueCents)} sub={`${ingredients.length} insumos en stock`} icon="box" accent="gold" />
            <HeroKpi label="Necesitan atención" value={critical + low + expiring} sub={`${critical} críticos · ${low} bajos · ${expiring} por vencer`} icon="alert" accent="danger" />
          </div>

          {/* Action cards */}
          <div className="grid grid-cols-3 gap-4">
            <ActionCard
              icon="camera" color="clay"
              title="Hacer conteo con foto"
              desc="Toma fotos de tus despensas y la IA cuenta los insumos por ti"
              cta="Empezar conteo"
            />
            <ActionCard
              icon="package" color="gold"
              title="Generar pedidos a proveedores"
              desc={`${critical} insumos críticos esperan reposición. Lo hacemos automático.`}
              cta="Generar pedidos"
              urgent={critical > 0}
            />
            <ActionCard
              icon="sparkle" color="olive"
              title="Crear campañas con IA"
              desc="La IA analiza tu data y propone campañas para vender más"
              cta="Generar sugerencias"
            />
          </div>

          {/* Bottom: ingredient health overview */}
          <div className="bg-paper border border-border rounded-2xl p-6">
            <div className="flex items-center justify-between mb-4">
              <div>
                <h2 className="font-display text-xl font-semibold">Salud del inventario</h2>
                <p className="text-xs text-muted mt-0.5">Por categoría · {ingredients.length} insumos</p>
              </div>
              <button className="text-sm text-clay font-semibold" onClick={() => window._mesasmartUnhandled && window._mesasmartUnhandled() || alert("Función disponible próximamente · estamos completando esta acción")}>Ver todo →</button>
            </div>
            <div className="grid grid-cols-7 gap-3">
              {Object.entries(CAT_VISUAL).map(([catName, viz]) => {
                const items = ingredients.filter(i => i.cat === catName);
                if (items.length === 0) return null;
                const okCount = items.filter(i => stockStatus(i).code === "ok").length;
                const lowCount = items.filter(i => stockStatus(i).code === "low").length;
                const critCount = items.filter(i => stockStatus(i).code === "critical").length;
                const allOk = critCount === 0 && lowCount === 0;
                return (
                  <button key={catName} className="p-3 bg-cream rounded-xl text-center hover:shadow-soft transition" onClick={() => window._mesasmartUnhandled && window._mesasmartUnhandled() || alert("Función disponible próximamente · estamos completando esta acción")}>
                    <div className="text-3xl">{viz.emoji}</div>
                    <p className="font-semibold text-xs mt-1 leading-tight">{catName}</p>
                    <p className="text-[10px] text-muted mt-0.5">{items.length} items</p>
                    <div className="mt-2 inline-flex items-center gap-1 text-[10px] font-bold">
                      {allOk ? (
                        <span className="text-olive">✓ OK</span>
                      ) : (
                        <span className={critCount > 0 ? "text-danger" : "text-warn"}>
                          ⚠ {critCount + lowCount} alertas
                        </span>
                      )}
                    </div>
                  </button>
                );
              })}
            </div>
          </div>

          {/* Last 7 days chart */}
          <div className="bg-paper border border-border rounded-2xl p-6">
            <h2 className="font-display text-xl font-semibold mb-4">Margen últimos 7 días</h2>
            <div className="flex items-end gap-2 h-48">
              {PNL_BY_DAY.map((d, i) => {
                const max = Math.max(...PNL_BY_DAY.map(x => x.revenue));
                return (
                  <div key={i} className="flex-1 flex flex-col items-center gap-1 group">
                    <span className="text-[10px] text-muted opacity-0 group-hover:opacity-100 font-bold">{PENk(d.margin)}</span>
                    <div className="w-full flex-1 relative bg-cream rounded-t-lg overflow-hidden flex flex-col-reverse grow-bar">
                      <div className="w-full bg-clay" style={{ height: `${(d.margin / max) * 100}%` }}></div>
                      <div className="w-full bg-clay/30 absolute bottom-0" style={{ height: `${(d.revenue / max) * 100}%` }}></div>
                    </div>
                    <span className="text-[10px] text-muted">{d.day}</span>
                  </div>
                );
              })}
            </div>
            <div className="flex items-center gap-4 mt-4 text-xs text-muted">
              <span className="inline-flex items-center gap-1.5"><span className="w-3 h-3 rounded bg-clay"></span> Margen bruto</span>
              <span className="inline-flex items-center gap-1.5"><span className="w-3 h-3 rounded bg-clay/30"></span> Ventas</span>
            </div>
          </div>
        </div>
      );
    }

    function ActionCard({ icon, color, title, desc, cta, urgent }) {
      const cmap = { clay: "bg-clay text-white", gold: "bg-gold text-charcoal", olive: "bg-olive text-white" };
      return (
        <div className={`bg-paper border-2 rounded-2xl p-5 lift-on-hover group ${urgent ? 'border-danger animate-pulse' : 'border-border'}`}>
          <div className={`w-12 h-12 rounded-xl ${cmap[color]} flex items-center justify-center icon-scale`}>
            <Icon name={icon} size={22} />
          </div>
          <h3 className="font-display text-lg font-semibold mt-3">{title}</h3>
          <p className="text-xs text-muted mt-1 leading-relaxed">{desc}</p>
          <button className={`mt-4 inline-flex items-center gap-1 text-sm font-bold transition ${urgent ? 'text-danger' : `text-${color}`}`} onClick={() => window._mesasmartUnhandled && window._mesasmartUnhandled() || alert("Función disponible próximamente · estamos completando esta acción")}>
            {cta} <Icon name="chevronRight" size={14} className="group-hover:translate-x-1 transition" />
          </button>
        </div>
      );
    }

    // ─────────────────────── INVENTARIO ───────────────────────
    function Inventario({ ingredients, setIngredients }) {
      const [search, setSearch] = useState("");
      const [filterCat, setFilterCat] = useState("all");
      const [filterStatus, setFilterStatus] = useState("all"); // all | critical | low | ok
      const [selected, setSelected] = useState(null);

      const cats = ["all", ...Object.keys(CAT_VISUAL)];

      const filtered = ingredients.filter(i => {
        if (filterCat !== "all" && i.cat !== filterCat) return false;
        if (search && !i.name.toLowerCase().includes(search.toLowerCase())) return false;
        if (filterStatus !== "all" && stockStatus(i).code !== filterStatus) return false;
        return true;
      });

      const counts = {
        all: ingredients.length,
        critical: ingredients.filter(i => stockStatus(i).code === "critical").length,
        low: ingredients.filter(i => stockStatus(i).code === "low").length,
        ok: ingredients.filter(i => stockStatus(i).code === "ok").length
      };

      return (
        <div className="space-y-5">
          <div className="flex items-center justify-between">
            <div>
              <h1 className="font-display text-3xl font-semibold">Inventario</h1>
              <p className="text-muted mt-1">Cada tarjeta muestra el stock actual de un insumo. Toca para ver detalle.</p>
            </div>
            <button className="inline-flex items-center gap-2 px-4 py-2.5 bg-clay text-white rounded-xl font-semibold text-sm" onClick={() => window._mesasmartUnhandled && window._mesasmartUnhandled() || alert("Función disponible próximamente · estamos completando esta acción")}>
              <Icon name="plus" size={16} /> Nuevo insumo
            </button>
          </div>

          {/* Status filter pills (very visual) */}
          <div className="flex gap-3">
            {[
              { id: "all", label: "Todos", color: "ink", n: counts.all },
              { id: "critical", label: "🚨 Crítico · pedir ya", color: "danger", n: counts.critical },
              { id: "low", label: "⚠️ Stock bajo", color: "warn", n: counts.low },
              { id: "ok", label: "✓ OK", color: "olive", n: counts.ok }
            ].map(f => (
              <button
                key={f.id}
                onClick={() => setFilterStatus(f.id)}
                className={`flex-1 p-4 rounded-xl text-left transition border-2 ${filterStatus === f.id ? `border-${f.color === 'ink' ? 'charcoal' : f.color} bg-${f.color === 'ink' ? 'charcoal' : f.color}/5` : 'border-border bg-paper hover:border-charcoal/30'}`}
              >
                <p className="font-display text-3xl font-bold">{f.n}</p>
                <p className="text-xs font-semibold mt-1">{f.label}</p>
              </button>
            ))}
          </div>

          {/* Search and category filter */}
          <div className="flex gap-3">
            <div className="relative flex-1">
              <Icon name="search" size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-muted" />
              <input
                value={search}
                onChange={(e) => setSearch(e.target.value)}
                placeholder="Buscar insumo..."
                className="w-full pl-10 pr-4 py-3 bg-paper border border-border rounded-xl text-sm focus:outline-none focus:border-clay"
              />
            </div>
            <div className="flex gap-1.5 overflow-x-auto no-scrollbar">
              {cats.map(c => (
                <button
                  key={c}
                  onClick={() => setFilterCat(c)}
                  className={`shrink-0 px-3 py-2 rounded-lg text-xs font-semibold transition ${filterCat === c ? 'bg-charcoal text-white' : 'bg-paper border border-border'}`}
                >
                  {c === "all" ? "Todas" : (
                    <>
                      <span className="mr-1">{CAT_VISUAL[c]?.emoji}</span>
                      {c}
                    </>
                  )}
                </button>
              ))}
            </div>
          </div>

          {/* Photo-first ingredient cards (Sortly style) */}
          <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
            {filtered.map(i => <IngredientCard key={i.id} ing={i} onClick={() => setSelected(i)} />)}
          </div>

          {filtered.length === 0 && (
            <div className="text-center py-16 bg-paper rounded-2xl border border-border lift-on-hover fade-in-up">
              <div className="w-16 h-16 rounded-full bg-cream flex items-center justify-center mx-auto mb-4">
                <Icon name="search" size={32} className="text-muted" />
              </div>
              <p className="font-display text-xl font-semibold">Sin resultados</p>
              <p className="text-sm text-muted mt-1">Ajusta los filtros o búsqueda para encontrar lo que necesitas</p>
            </div>
          )}

          {selected && <IngredientDetail ing={selected} onClose={() => setSelected(null)} onAdjust={(newQty, reason) => {
            setIngredients(prev => prev.map(i => i.id === selected.id ? { ...i, current: newQty } : i));
            setSelected(null);
          }} />}
        </div>
      );
    }

    function IngredientCard({ ing, onClick }) {
      const status = stockStatus(ing);
      const pct = stockPct(ing);
      const viz = CAT_VISUAL[ing.cat];
      const borderColorMap = { critical: "border-danger", low: "border-warn", ok: "border-olive" };
      const borderColor = borderColorMap[status.code];
      return (
        <button
          onClick={onClick}
          className={`bg-paper border-2 border-border rounded-2xl p-4 text-left transition group lift-on-hover relative overflow-hidden ${borderColor ? `border-l-4 ${borderColor}` : ''}`}
        >
          {/* Photo / Emoji area */}
          <div className="relative h-32 rounded-xl flex items-center justify-center mb-3" style={{ background: viz?.bg }}>
            <span className="text-7xl group-hover:scale-105 transition duration-300">{ing.emoji}</span>
            {status.code !== 'ok' && (
              <span className={`absolute top-2 right-2 px-3 py-1 ${status.bg} ${status.text} text-[11px] font-bold rounded-lg uppercase tracking-wider shadow-soft`}>
                {status.label}
              </span>
            )}
            {ing.trackExpiration && (
              <span className="absolute top-2 left-2 w-7 h-7 bg-paper/80 rounded-full flex items-center justify-center" title="Producto perecible">
                <Icon name="clock" size={12} className="text-muted" />
              </span>
            )}
          </div>

          {/* Title + supplier */}
          <p className="font-semibold text-sm leading-tight">{ing.name}</p>
          <p className="text-[11px] text-muted mt-0.5 truncate">{ing.supplier}</p>

          {/* Stock visual */}
          <div className="mt-3">
            <div className="flex items-baseline justify-between">
              <span className="font-mono text-xl font-bold">{ing.current}</span>
              <span className="text-[10px] text-muted">de {ing.optimal} {ing.unit}</span>
            </div>
            <div className="mt-1.5">
              <StockBar percent={pct} status={status.code} />
            </div>
          </div>

          {/* Cost */}

    // ─────────────────────── CONVERSIONES DE INSUMOS ───────────────────────
    function Conversiones() {
      const [transformations, setTransformations] = useState(TRANSFORMATIONS_SEED);
      const [showModal, setShowModal] = useState(false);

      const totalTransfWeek = transformations.reduce((s, t) => s + t.executions, 0);
      const avgYield = transformations.reduce((s, t) => s + (t.realYield || t.yieldPct), 0) / transformations.length;
      const estimatedLoss = transformations.reduce((s, t) => {
        const expected = t.yieldPct;
        const real = t.realYield || expected;
        const diff = expected - real;
        return s + (diff > 0 ? diff * 2.5 : 0);
      }, 0) * 100;

      return (
        <div className="space-y-5">
          <div>
            <p className="text-[11px] uppercase tracking-wider text-muted font-bold">El costo real de tu cocina</p>
            <h1 className="font-display text-3xl font-semibold">Conversiones de insumos</h1>
            <p className="text-muted mt-1">Transforma M.P. en productos preparados. Cada nivel tiene yield, costo de labor y margen diferente.</p>
          </div>

          <div className="grid grid-cols-4 gap-4">
            <HeroKpi label="Conversiones esta semana" value={totalTransfWeek} accent="gold" animate={false} />
            <HeroKpi label="Yield promedio real" value={`${avgYield.toFixed(1)}%`} accent="olive" animate={false} />
            <HeroKpi label="Merma estimada" value={PEN(Math.round(estimatedLoss * 100))} accent="warn" animate={false} />
            <HeroKpi label="Transformaciones activas" value={transformations.length} accent="clay" animate={false} />
          </div>

          <div className="bg-paper border border-border rounded-2xl p-6">
            <div className="flex items-center justify-between mb-5">
              <h2 className="font-display text-xl font-semibold">Flujos de conversión</h2>

                <Icon name="plus" size={16} /> Nueva conversión
              </button>
            </div>
            <div className="space-y-3">
              {transformations.map(t => {
                const hasHighWaste = (t.realYield || t.yieldPct) < t.yieldPct - 5;
                return (
                  <div key={t.id} className={`border rounded-xl p-4 lift-on-hover ${hasHighWaste ? 'bg-danger/5 border-danger/30' : 'bg-cream border-border'}`}>
                    <div className="flex items-center justify-between gap-4">
                      <div className="flex items-center gap-4 flex-1">
                        <div className="text-3xl">{t.from.emoji}</div>
                        <div>
                          <p className="text-sm font-semibold">{t.from.name}</p>

                        </div>
                        <Icon name="chevronRight" size={18} className="text-muted" />

                        <div>
                          <p className="text-sm font-semibold">{t.to.name}</p>
                          <p className="text-[10px] text-muted">{t.to.level}</p>
                        </div>
                      </div>
                      <div className="flex items-center gap-4">
                        <div className="text-right">
                          <p className="text-[10px] text-muted">Yield</p>
                          <p className="font-mono font-bold text-sm">{t.realYield || t.yieldPct}%</p>
                          {t.realYield && t.realYield < t.yieldPct - 5 && <p className="text-[10px] text-danger">vs {t.yieldPct}% esperado</p>}
                        </div>
                        <div className="text-right">
                          <p className="text-[10px] text-muted">Labor</p>

                      </div>
                    </div>

                );
              })}

                  <button className="w-full py-3 bg-clay text-white rounded-xl font-semibold" onClick={() => window._mesasmartUnhandled && window._mesasmartUnhandled() || alert("Función disponible próximamente · estamos completando esta acción")}>Guardar conversión</button>

                <p className="text-xs text-muted mt-0.5">{p.for}</p>
                <p className="font-display text-2xl font-bold mt-3">{PEN(p.priceMonthly)}</p>
                <button className={`mt-3 w-full py-2 rounded-lg text-xs font-semibold transition ${plan.current === p.id ? 'bg-clay text-white' : 'bg-cream border border-border hover:bg-clay hover:text-white'}`} onClick={() => window._mesasmartUnhandled && window._mesasmartUnhandled() || alert("Función disponible próximamente · estamos completando esta acción")}>
                  {plan.current === p.id ? 'Tu plan' : 'Cambiar'}
                </button>
              </button>
            ))}
          </div>

          <div className="bg-paper border border-border rounded-2xl p-6">
            <h2 className="font-display text-xl font-semibold mb-4">Módulos activos ({activeModuleKeys.length}/{Object.keys(plan.modules).length})</h2>
            <div className="grid grid-cols-2 gap-3">
              {Object.entries(plan.modules).map(([key, mod]) => {
                const isActive = activeModuleKeys.includes(key);
                return (
                  <div key={key} className={`border rounded-xl p-4 transition lift-on-hover ${isActive ? 'bg-cream border-border' : 'bg-cream/30 border-border/30 opacity-60'}`}>
                    <div className="flex items-start gap-3">
                      <input type="checkbox" checked={isActive} disabled={mod.locked} className="w-5 h-5 mt-0.5" />
                      <div className="flex-1">
                        <div className="flex items-center gap-2">
                          <p className="font-semibold text-sm">{mod.label}</p>
                          {mod.premium && <span className="bg-gold/20 text-gold text-[10px] font-bold px-2 py-0.5 rounded-full">Premium</span>}
                          {mod.locked && <span className="text-[10px] text-muted">Siempre activo</span>}
                        </div>
                        <p className="text-[11px] text-muted mt-1">{mod.desc}</p>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          <div className="bg-gold/5 border border-gold/20 rounded-xl p-4 inline-flex items-start gap-3">
            <Icon name="sparkle" size={18} className="text-gold shrink-0 mt-0.5" />
            <div className="text-sm">
              <p className="font-bold text-gold">💡 Consejo</p>
              <p className="text-muted mt-1">Arranca con Standard si tienes 1 local, sube a Pro cuando tu cocina necesite tracking de mermas, ve a Enterprise si abres más locales.</p>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────── ALERTAS (consolidado) ───────────────────────
    function Alertas({ ingredients }) {
      const critical = ingredients.filter(i => stockStatus(i).code === "critical");
      const expiring = ingredients.filter(i => i.trackExpiration && i.expDays <= 3);
      return (
        <div className="space-y-5">
          <div>
            <h1 className="font-display text-3xl font-semibold">Alertas activas</h1>
            <p className="text-muted mt-1">Todo lo que necesita tu atención, en un solo lugar.</p>
          </div>

          {critical.length > 0 && (
            <div className="bg-danger/5 border-2 border-danger/30 rounded-2xl p-5">
              <h2 className="font-display text-xl font-semibold text-danger mb-3 inline-flex items-center gap-2">
                <Icon name="alert" size={20} /> {critical.length} insumos en stock CRÍTICO
              </h2>
              <div className="grid grid-cols-2 gap-2">
                {critical.map(i => (
                  <div key={i.id} className="bg-paper border border-danger/30 rounded-lg p-3 flex items-center gap-3">
                    <span className="text-2xl">{i.emoji}</span>
                    <div className="flex-1">
                      <p className="font-semibold text-sm">{i.name}</p>
                      <p className="text-xs text-muted">Solo {i.current} {i.unit} · pidir mín. {i.optimal - i.current} más</p>
                    </div>
                    <button className="px-3 py-1.5 bg-danger text-white rounded-lg text-xs font-bold" onClick={() => window._mesasmartUnhandled && window._mesasmartUnhandled() || alert("Función disponible próximamente · estamos completando esta acción")}>Pedir</button>
                  </div>
                ))}
              </div>
              <button className="mt-4 w-full py-3 bg-danger text-white rounded-xl font-semibold" onClick={() => window._mesasmartUnhandled && window._mesasmartUnhandled() || alert("Función disponible próximamente · estamos completando esta acción")}>
                Generar pedidos a proveedores ahora
              </button>
            </div>
          )}

          {expiring.length > 0 && (
            <div className="bg-warn/5 border-2 border-warn/30 rounded-2xl p-5">
              <h2 className="font-display text-xl font-semibold text-warn mb-3 inline-flex items-center gap-2">
                <Icon name="clock" size={20} /> {expiring.length} insumos por vencer pronto
              </h2>
              <div className="grid grid-cols-2 gap-2">
                {expiring.map(i => (
                  <div key={i.id} className="bg-paper border border-warn/30 rounded-lg p-3 flex items-center gap-3">
                    <span className="text-2xl">{i.emoji}</span>
                    <div className="flex-1">
                      <p className="font-semibold text-sm">{i.name}</p>
                      <p className="text-xs text-muted">Vence en <span className="font-bold text-warn">{i.expDays} {i.expDays === 1 ? 'día' : 'días'}</span></p>
                    </div>
                    <button className="px-3 py-1.5 bg-warn text-white rounded-lg text-xs font-bold" onClick={() => window._mesasmartUnhandled && window._mesasmartUnhandled() || alert("Función disponible próximamente · estamos completando esta acción")}>💡 Promo</button>
                  </div>
                ))}
              </div>
            </div>
          )}

          {critical.length === 0 && expiring.length === 0 && (
            <div className="bg-olive/10 border-2 border-olive/30 rounded-2xl p-12 text-center lift-on-hover fade-in-up">
              <div className="w-16 h-16 rounded-full bg-olive/20 flex items-center justify-center mx-auto mb-4">
                <Icon name="check" size={48} className="text-olive" />
              </div>
              <h2 className="font-display text-3xl font-semibold text-olive">¡Todo bajo control!</h2>
              <p className="text-muted mt-2">No hay alertas pendientes. Tu inventario está en buen estado.</p>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────── APP ───────────────────────
    function App() {
      const [view, setView] = useState("resumen");
      const [ingredients, setIngredients] = useState(INGREDIENTS_SEED);

      return (
        <div className="flex min-h-full">
          <Sidebar active={view} setActive={setView} />
          <div className="flex-1 overflow-x-hidden">
            <main className="p-8 fade-in-up" key={view} style={{ animationDelay: '0ms' }}>
              {view === "resumen" && <Resumen ingredients={ingredients} />}
              {view === "alertas" && <Alertas ingredients={ingredients} />}
              {view === "inventario" && <Inventario ingredients={ingredients} setIngredients={setIngredients} />}
              {view === "conteo" && <ConteoFisico ingredients={ingredients} />}
              {view === "conversiones" && <Conversiones />}
              {view === "recetas" && <Recetas />}
              {view === "proveedores" && <Proveedores />}
              {view === "recepcion" && <RecepcionGuias />}
              {view === "compras" && <Compras ingredients={ingredients} />}
              {view === "caducidad" && <Caducidad ingredients={ingredients} />}
              {view === "pnl" && <Pnl />}
              {view === "campanas" && <Campanas />}
              {view === "plan" && <PlanRestaurante />}
            </main>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
