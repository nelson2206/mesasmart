              );
            })}

    // Status config for floor plan tables
    const tableStatusConfig = (table, isMine) => {
      if (table.blocked) return { bg: "bg-charcoal/10", border: "border-charcoal/30 border-dashed", text: "text-charcoal", label: "Bloqueada" };
      if (table.complaint) return { bg: "bg-danger/10", border: "border-danger", text: "text-danger", label: "Queja" };
      if (table.joinedWith) return { bg: "bg-gold/10", border: "border-gold", text: "text-gold", label: "Unida" };
      switch (table.status) {
        case "free": return { bg: "bg-paper", border: "border-border", text: "text-muted", label: "Libre" };
        case "occupied": return { bg: isMine ? "bg-clay/10" : "bg-paper", border: isMine ? "border-clay" : "border-border", text: isMine ? "text-clay" : "text-muted", label: "Ocupada" };

      const c = tableStatusConfig(table, isMine);
      const hasAlert = table.alert || table.complaint;

        <button
          onClick={() => onTap(table)}
          className={`relative aspect-square rounded-xl border-2 ${c.border} ${c.bg} p-2 text-left transition active:scale-95`}

          {hasAlert && (
            <span className="absolute -top-1.5 -right-1.5 w-4 h-4 bg-danger rounded-full pulse-dot border-2 border-cream"></span>
          )}
          {table.joinedWith && (
            <span className="absolute -top-1.5 -left-1.5 w-5 h-5 bg-gold rounded-full text-white text-[10px] font-bold flex items-center justify-center border-2 border-cream">+</span>
          )}
          {isMine && !table.blocked && (
            <span className="absolute top-1 left-1 w-1.5 h-1.5 rounded-full bg-clay"></span>
          )}
          <div className="flex items-start justify-between">
            <span className="font-display text-lg font-bold">{table.id}</span>
          </div>
          <p className="text-[9px] text-muted -mt-1">{table.seats} asientos</p>
          {table.status === 'occupied' || table.status === 'billing' || table.status === 'alert' ? (
            <div className="mt-1">
              <p className={`text-[10px] font-semibold ${c.text}`}>{table.party}/{table.seats}</p>
              <p className="text-[9px] text-muted font-mono">{table.time}'</p>
            </div>
          ) : (
            <p className={`text-[10px] mt-1 font-semibold ${c.text}`}>{c.label}</p>
          )}
          {table.server && !isMine && (
            <p className="text-[8px] text-muted absolute bottom-1 right-1.5">{table.server.split(" ")[0]}</p>
          )}
        </button>
      );
    }

    // Floor plan view
    function PlanoView({ tables, onTap, joinMode, joinFirst }) {
      const cols = 6;
      const rows = 3;
      const grid = {};
      tables.forEach(t => { grid[`${t.x}-${t.y}`] = t; });

      const myTables = tables.filter(t => t.server === ME.name).length;
      const free = tables.filter(t => t.status === "free").length;
      const blocked = tables.filter(t => t.blocked).length;
      const joined = tables.filter(t => t.joinedWith).length;

      // Group by zone for zone labels
      const zones = ["Ventana", "Centro", "Pared", "Terraza"];

      return (
        <div className="px-5 py-5 space-y-5">
          {joinMode && (
            <div className="bg-gold/10 border-2 border-gold rounded-2xl p-4 anim-fade-in">
              <p className="font-bold text-gold text-sm">{joinFirst ? `Mesa ${joinFirst.id} seleccionada` : "Selecciona la primera mesa"}</p>
              <p className="text-xs text-muted mt-1">{joinFirst ? "Toca una segunda mesa adyacente para unir" : "Estás en modo unir mesas"}</p>
            </div>
          )}

          <div>
            <div className="flex items-center justify-between mb-3">
              <h2 className="font-display text-xl font-semibold">Plano del salón</h2>
              <span className="text-[11px] text-muted">{myTables} tuyas · {free} libres</span>
            </div>

            <div className="bg-paper border border-border rounded-2xl p-3">
              <div className="text-[10px] text-muted uppercase tracking-wider mb-2 px-2 flex items-center gap-1">
                <Icon name="layout" size={11} /> Vista superior · Salón principal
              </div>
              <div className="grid grid-cols-6 gap-1.5">
                {Array.from({ length: rows }).map((_, y) =>
                  Array.from({ length: cols }).map((_, x) => {
                    const t = grid[`${x}-${y}`];
                    if (!t) return <div key={`${x}-${y}`} className="aspect-square"></div>;
                    return <PlanTile key={t.id} table={t} isMine={t.server === ME.name} onTap={onTap} />;
                  })
                )}
              </div>
              {/* Legend */}
              <div className="mt-3 pt-3 border-t border-border flex flex-wrap gap-2 text-[10px] text-muted">
                <Legend dot="bg-clay" label="Mías" />
                <Legend dot="bg-border" label="Otras" />
                <Legend dot="bg-charcoal/30" label="Bloqueada" dashed />
                <Legend dot="bg-gold" label="Unida" />
                <Legend dot="bg-danger" label="Queja" />
              </div>
            </div>
          </div>

          {(blocked > 0 || joined > 0) && (
            <div className="grid grid-cols-2 gap-2 text-xs">
              {blocked > 0 && (
                <div className="bg-paper border border-border rounded-xl p-3">
                  <p className="text-muted text-[10px] uppercase">Bloqueadas</p>
                  <p className="font-display text-2xl font-bold mt-1">{blocked}</p>
                </div>
              )}
              {joined > 0 && (
                <div className="bg-paper border border-border rounded-xl p-3">
                  <p className="text-muted text-[10px] uppercase">Mesas unidas</p>
                  <p className="font-display text-2xl font-bold mt-1">{joined / 2}</p>
                </div>
              )}
            </div>
          )}

          <div className="text-[11px] text-muted bg-paper border border-border rounded-xl p-3 leading-relaxed">
            <p className="font-semibold text-ink mb-1">Tip para mozos nuevos</p>
            Las mesas marcadas con un <span className="inline-block w-1.5 h-1.5 rounded-full bg-clay mx-0.5"></span> son tuyas. Toca cualquier mesa para ver el detalle. Si juntas dos mesas físicamente, márcalas como "unidas" para que otros mozos no se confundan.
          </div>
        </div>
      );
    }

    function Legend({ dot, label, dashed }) {
      return (
        <span className="inline-flex items-center gap-1">
          <span className={`w-2 h-2 rounded-full ${dot} ${dashed ? 'border border-dashed border-charcoal/40' : ''}`}></span>
          {label}
        </span>
      );
    }

    // Action sheet for table operations
    function TableActionSheet({ open, table, onClose, onAction }) {
      if (!open || !table) return null;
      const isMine = table.server === ME.name;
      const c = tableStatusConfig(table, isMine);

      return (
        <div className="fixed inset-0 z-50 bg-charcoal/40 flex items-end" onClick={onClose}>
          <div onClick={(e) => e.stopPropagation()} className="slide-up bg-cream w-full max-w-[420px] mx-auto rounded-t-3xl max-h-[88vh] overflow-y-auto no-scrollbar">
            <div className="p-5 border-b border-border bg-paper sticky top-0 z-10">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-3">
                  <div className={`w-12 h-12 rounded-xl ${c.bg} ${c.border} border-2 flex items-center justify-center font-display text-xl font-bold ${c.text}`}>
                    {table.id}
                  </div>
                  <div>
                    <p className="font-display text-xl font-bold">Mesa {table.id}</p>
                    <p className="text-xs text-muted">{table.zone || "Salón"} · {table.seats} asientos · <span className={c.text}>{c.label}</span></p>
                  </div>
                </div>
                <button onClick={onClose} className="w-9 h-9 rounded-full bg-cream border border-border"><Icon name="x" size={16} className="mx-auto" /></button>
              </div>
            </div>

            {table.complaint && (
              <div className="m-5 p-3 bg-danger/10 border border-danger/30 rounded-xl">
                <p className="text-xs font-bold text-danger inline-flex items-center gap-1.5">
                  <Icon name="alert" size={12} /> Queja activa
                </p>
                <p className="text-sm mt-1">{table.complaint}</p>
                <button onClick={() => onAction("clearComplaint", table.id)} className="mt-2 text-xs text-olive font-semibold">
                  ✓ Resolver queja
                </button>
              </div>
            )}

            {table.joinedWith && (
              <div className="mx-5 mt-5 p-3 bg-gold/10 border border-gold/30 rounded-xl">
                <p className="text-xs font-bold text-gold">Unida con Mesa {table.joinedWith}</p>
                <p className="text-[11px] text-muted mt-0.5">Capacidad combinada: {table.seats + (table.joinedSeats || 0)} asientos</p>
                <button onClick={() => onAction("unjoin", table.id)} className="mt-2 text-xs text-clay font-semibold">
                  Separar mesas
                </button>
              </div>
            )}

            {table.blocked && (
              <div className="mx-5 mt-5 p-3 bg-charcoal/5 border border-charcoal/20 rounded-xl">
                <p className="text-xs font-bold">Mesa bloqueada</p>
                <p className="text-[11px] text-muted mt-0.5">{table.blockedReason || "No disponible"}</p>
                <button onClick={() => onAction("unblock", table.id)} className="mt-2 text-xs text-olive font-semibold">
                  Desbloquear
                </button>
              </div>
            )}

            <div className="p-5">
              {(table.status === 'occupied' || table.status === 'billing' || table.status === 'alert') && isMine && (
                <div className="mb-4 grid grid-cols-3 gap-2">
                  <StatCard label="Comensales" value={`${table.party}/${table.seats}`} />
                  <StatCard label="Tiempo" value={`${table.time}'`} />
                  <StatCard label="Total" value={PEN(table.total)} />
                </div>
              )}

              <p className="text-[11px] font-bold uppercase tracking-wider text-muted mb-2">Acciones rápidas</p>
              <div className="space-y-2">
                {!table.complaint && (
                  <ActionButton
                    icon="alert" color="danger"
                    title="Marcar queja del cliente"
                    desc="Sube prioridad y notifica a cocina y admin"
                    onClick={() => onAction("complaint", table.id)}
                  />
                )}
                {!table.blocked && !table.joinedWith && (
                  <ActionButton
                    icon="layout" color="gold"
                    title="Unir con otra mesa"
                    desc="Cuando juntas físicamente 2 mesas para un grupo"
                    onClick={() => onAction("joinStart", table.id)}
                  />
                )}
                {!table.blocked && table.status === 'free' && (
                  <ActionButton
                    icon="x" color="charcoal"
                    title="Bloquear mesa"
                    desc="Indicar que no está disponible (limpieza, daño, etc.)"
                    onClick={() => onAction("blockStart", table.id)}
                  />
                )}
                <ActionButton
                  icon="edit" color="muted"
                  title="Editar capacidad"
                  desc={`Actualmente ${table.seats} asientos`}
                  onClick={() => onAction("editStart", table.id)}
                />
                {(table.status === 'occupied' || table.status === 'alert') && isMine && (
                  <ActionButton
                    icon="receipt" color="olive"
                    title="Ver pedido"
                    desc="Detalle de items y estados"
                    onClick={() => onAction("viewOrder", table.id)}
                  />
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function ActionButton({ icon, color, title, desc, onClick }) {
      const colorMap = { danger: "bg-danger/10 text-danger", gold: "bg-gold/10 text-gold", charcoal: "bg-charcoal/5 text-charcoal", muted: "bg-cream text-muted", olive: "bg-olive/10 text-olive" };
      return (
        <button onClick={onClick} className="w-full flex items-center gap-3 p-3 bg-paper border border-border rounded-xl text-left hover:border-clay transition">
          <div className={`w-10 h-10 rounded-lg flex items-center justify-center ${colorMap[color]}`}>
            <Icon name={icon} size={18} />
          </div>
          <div className="flex-1 min-w-0">
            <p className="text-sm font-semibold">{title}</p>
            <p className="text-[11px] text-muted">{desc}</p>
          </div>
          <Icon name="chevronRight" size={14} className="text-muted" />
        </button>
      );
    }

    // Block reason modal
    function BlockReasonModal({ open, onClose, onConfirm }) {
      const reasons = [
        { id: "cleaning", label: "Limpieza profunda", icon: "x" },
        { id: "damaged", label: "Mesa o silla dañada", icon: "alert" },
        { id: "private", label: "Reserva privada / VIP", icon: "users" },
        { id: "other", label: "Otro motivo", icon: "edit" }
      ];
      if (!open) return null;
      return (
        <div className="fixed inset-0 z-[60] bg-charcoal/40 flex items-end" onClick={onClose}>
          <div onClick={(e) => e.stopPropagation()} className="slide-up bg-cream w-full max-w-[420px] mx-auto rounded-t-3xl p-5">
            <p className="font-display text-xl font-semibold mb-1">Bloquear mesa</p>
            <p className="text-xs text-muted mb-4">Otros mozos verán esta mesa como no disponible.</p>
            <div className="space-y-2">
              {reasons.map(r => (
                <button key={r.id} onClick={() => onConfirm(r.label)} className="w-full flex items-center gap-3 p-3 bg-paper border border-border rounded-xl text-left hover:border-clay">
                  <div className="w-9 h-9 rounded-lg bg-charcoal/5 flex items-center justify-center text-charcoal">
                    <Icon name={r.icon} size={16} />
                  </div>
                  <span className="text-sm font-medium flex-1">{r.label}</span>
                </button>
              ))}
            </div>
            <button onClick={onClose} className="w-full mt-4 py-3 text-sm text-muted">Cancelar</button>
          </div>
        </div>
      );
    }

    // Complaint modal
    function ComplaintModal({ open, onClose, onConfirm }) {
      const reasons = [
        "Demora excesiva",
        "Plato frío",
        "Plato incorrecto / mal preparado",
        "Trato del personal",
        "Limpieza del lugar",
        "Otro motivo"
      ];
      if (!open) return null;
      return (
        <div className="fixed inset-0 z-[60] bg-charcoal/40 flex items-end" onClick={onClose}>
          <div onClick={(e) => e.stopPropagation()} className="slide-up bg-cream w-full max-w-[420px] mx-auto rounded-t-3xl p-5">
            <p className="font-display text-xl font-semibold mb-1 text-danger">Queja del cliente</p>
            <p className="text-xs text-muted mb-4">Esta mesa subirá a prioridad alta en cocina y admin será notificado.</p>
            <div className="space-y-2">
              {reasons.map(r => (
                <button key={r} onClick={() => onConfirm(r)} className="w-full flex items-center gap-3 p-3 bg-paper border border-danger/30 rounded-xl text-left hover:bg-danger/5">
                  <Icon name="alert" size={14} className="text-danger" />
                  <span className="text-sm font-medium flex-1 text-danger">{r}</span>
                </button>
              ))}
            </div>
            <button onClick={onClose} className="w-full mt-4 py-3 text-sm text-muted">Cancelar</button>
          </div>
        </div>
      );
    }

    // Edit capacity modal
    function EditCapacityModal({ open, table, onClose, onConfirm }) {
      const [seats, setSeats] = useState(table?.seats || 4);
      useEffect(() => { if (table) setSeats(table.seats); }, [table]);
      if (!open || !table) return null;
      return (
        <div className="fixed inset-0 z-[60] bg-charcoal/40 flex items-end" onClick={onClose}>
          <div onClick={(e) => e.stopPropagation()} className="slide-up bg-cream w-full max-w-[420px] mx-auto rounded-t-3xl p-5">
            <p className="font-display text-xl font-semibold mb-1">Mesa {table.id} · Editar</p>
            <p className="text-xs text-muted mb-4">Cambia cuántos asientos tiene esta mesa.</p>
            <div className="bg-paper border border-border rounded-xl p-4 flex items-center justify-between">
              <span className="text-sm text-muted">Asientos</span>
              <div className="inline-flex items-center bg-cream rounded-full">
                <button onClick={() => setSeats(Math.max(1, seats - 1))} className="w-10 h-10 text-clay font-bold">−</button>
                <span className="w-10 text-center font-display text-xl font-bold">{seats}</span>
                <button onClick={() => setSeats(Math.min(20, seats + 1))} className="w-10 h-10 text-clay font-bold">+</button>
              </div>
            </div>
            <div className="grid grid-cols-2 gap-2 mt-4">
              <button onClick={onClose} className="py-3 bg-cream border border-border rounded-xl text-sm font-semibold">Cancelar</button>
              <button onClick={() => onConfirm(seats)} className="py-3 bg-clay text-white rounded-xl text-sm font-semibold">Guardar</button>
            </div>
          </div>
        </div>
      );
    }

    function StatCard({ label, value, sub }) {
      return (
        <div className="bg-paper border border-border rounded-2xl p-3.5 flex-1">
          <p className="text-[11px] text-muted uppercase tracking-wider">{label}</p>
          <p className="font-display text-2xl font-bold mt-1">{value}</p>
          {sub && <p className="text-[10px] text-muted mt-0.5">{sub}</p>}
        </div>
      );
    }

    function ItemStatus({ status }) {
      const c = {
        received: { color: "text-muted", label: "Recibido" },
        preparing: { color: "text-warn", label: "Preparando" },
        ready: { color: "text-sky", label: "Listo p/ servir" },
        served: { color: "text-olive", label: "Servido" }
      }[status];
      return (
        <span className={`text-[10px] font-semibold uppercase ${c.color}`}>{c.label}</span>
      );
    }

    function TableCard({ table, onClick }) {
      const isAlert = table.status === "alert";
      return (
        <button
          onClick={() => onClick(table)}
          className={`w-full text-left bg-paper border rounded-2xl p-4 transition ${isAlert ? (table.urgent ? 'border-danger bg-danger/5 shake' : 'border-clay bg-clay/5') : 'border-border'}`}
        >
          <div className="flex items-start justify-between">
            <div className="flex items-center gap-3">
              <div className={`w-12 h-12 rounded-xl flex items-center justify-center font-display text-xl font-bold ${isAlert ? 'bg-clay text-white' : 'bg-cream border border-border'}`}>
                {table.id}
              </div>
              <div>
                <p className="font-semibold text-sm">Mesa {table.id}</p>
                <p className="text-xs text-muted inline-flex items-center gap-1">
                  <Icon name="users" size={11} /> {table.party}/{table.seats}
                  <span className="mx-1">·</span>
                  <Icon name="clock" size={11} /> {table.time}'
                </p>
              </div>
            </div>
            <div className="text-right">
              <p className="font-display font-bold text-clay">{PEN(table.total)}</p>
              {isAlert && <p className="text-[10px] font-semibold text-clay mt-0.5">⚠ ¡Atender!</p>}
            </div>
          </div>

          {isAlert && table.alert && (
            <div className={`mt-3 p-2.5 rounded-xl ${table.urgent ? 'bg-danger/10 border border-danger/30' : 'bg-clay/10 border border-clay/30'}`}>
              <p className={`text-xs font-semibold ${table.urgent ? 'text-danger' : 'text-clay'} inline-flex items-center gap-1.5`}>
                <Icon name="alert" size={12} />
                {table.alert}
              </p>
              <p className="text-[10px] text-muted mt-0.5">hace {table.alertTime} min</p>
            </div>
          )}

          {table.items && table.items.length > 0 && (
            <div className="mt-3 space-y-1.5">
              {table.items.slice(0, 3).map((it, i) => {
                const c = it.status;
                const dot = c === 'ready' ? 'bg-sky' : c === 'preparing' ? 'bg-warn' : c === 'served' ? 'bg-olive' : 'bg-muted';
                return (
                  <div key={i} className="flex items-center gap-2">
                    <span className={`w-1.5 h-1.5 rounded-full ${dot} shrink-0`}></span>
                    <span className="text-xs flex-1 truncate text-ink">{it.qty}× {it.name}</span>
                    <ItemStatus status={it.status} />
                  </div>
                );
              })}
              {table.items.length > 3 && (
                <p className="text-[11px] text-muted">+ {table.items.length - 3} más</p>
              )}
            </div>
          )}
        </button>
      );
    }

    function CallCard({ call, onResolve }) {
      return (
        <div className={`bg-paper border rounded-2xl p-4 ${call.urgent ? 'border-danger bg-danger/5 shake' : 'border-clay bg-clay/5'}`}>
          <div className="flex items-start gap-3">
            <div className={`w-12 h-12 rounded-xl flex items-center justify-center font-display text-lg font-bold text-white shrink-0 ${call.urgent ? 'bg-danger' : 'bg-clay'}`}>
              {call.mesa}
            </div>
            <div className="flex-1 min-w-0">
              <p className={`text-sm font-bold inline-flex items-center gap-1.5 ${call.urgent ? 'text-danger' : 'text-clay'}`}>
                {call.urgent && <Icon name="alert" size={14} />}
                Mesa {call.mesa}
              </p>
              <p className="text-sm font-semibold mt-0.5">{call.reason}</p>
              <p className="text-[11px] text-muted mt-0.5">hace {call.time} min</p>
            </div>
          </div>
          <div className="mt-3 grid grid-cols-2 gap-2">
            <button className="py-2.5 bg-cream border border-border rounded-lg text-xs font-semibold" onClick={() => window._mesasmartUnhandled && window._mesasmartUnhandled() || alert("Función disponible próximamente · estamos completando esta acción")}>
              Ver mesa
            </button>
            <button onClick={() => onResolve(call.id)} className="py-2.5 bg-olive text-white rounded-lg text-xs font-semibold inline-flex items-center justify-center gap-1">
              <Icon name="check" size={14} /> Atendido
            </button>
          </div>
        </div>
      );
    }

    function TableDetail({ table, onClose }) {
      if (!table) return null;
      const itemsByStatus = {
        ready: table.items.filter(i => i.status === 'ready'),
        preparing: table.items.filter(i => i.status === 'preparing'),
        served: table.items.filter(i => i.status === 'served'),
        received: table.items.filter(i => i.status === 'received')
      };
      return (
        <div className="fixed inset-0 z-50 bg-charcoal/40 flex items-end" onClick={onClose}>
          <div onClick={(e) => e.stopPropagation()} className="slide-up bg-cream w-full max-w-[420px] mx-auto rounded-t-3xl max-h-[90vh] overflow-y-auto no-scrollbar">
            <div className="bg-paper px-5 py-4 border-b border-border flex items-center justify-between sticky top-0 z-10">
              <div>
                <h2 className="font-display text-2xl font-bold">Mesa {table.id}</h2>
                <p className="text-xs text-muted">{table.party} comensales · {table.time} min en mesa</p>
              </div>
              <button onClick={onClose} className="w-9 h-9 rounded-full bg-cream flex items-center justify-center">
                <Icon name="x" size={18} />
              </button>
            </div>

            {table.alert && (
              <div className={`m-5 p-3 rounded-xl ${table.urgent ? 'bg-danger/10 border border-danger/30' : 'bg-clay/10 border border-clay/30'}`}>
                <p className={`text-sm font-semibold ${table.urgent ? 'text-danger' : 'text-clay'} inline-flex items-center gap-1.5`}>
                  <Icon name="alert" size={14} />
                  {table.alert}
                </p>
              </div>
            )}

            <div className="px-5 py-3">
              <div className="flex gap-2">
                <StatCard label="Subtotal" value={PEN(table.total)} />
                <StatCard label="Items" value={table.items.length} sub={`${itemsByStatus.ready.length} listos`} />
              </div>
            </div>

            {itemsByStatus.ready.length > 0 && (
              <div className="px-5 mb-4">
                <p className="text-[11px] font-bold uppercase tracking-wider text-sky mb-2">⚡ Listos para servir ({itemsByStatus.ready.length})</p>
                <div className="bg-paper border border-sky/30 rounded-2xl divide-y divide-border">
                  {itemsByStatus.ready.map((it, i) => (
                    <div key={i} className="flex items-center justify-between p-3">
                      <div>
                        <p className="text-sm font-semibold">{it.qty}× {it.name}</p>
                      </div>
                      <button className="px-3 py-1.5 bg-olive text-white text-xs font-semibold rounded-lg" onClick={() => window._mesasmartUnhandled && window._mesasmartUnhandled() || alert("Función disponible próximamente · estamos completando esta acción")}>
                        Servido
                      </button>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {itemsByStatus.preparing.length > 0 && (
              <div className="px-5 mb-4">
                <p className="text-[11px] font-bold uppercase tracking-wider text-warn mb-2">⏳ En preparación ({itemsByStatus.preparing.length})</p>
                <div className="bg-paper border border-border rounded-2xl divide-y divide-border">
                  {itemsByStatus.preparing.map((it, i) => (
                    <div key={i} className="flex items-center justify-between p-3">
                      <p className="text-sm font-medium">{it.qty}× {it.name}</p>
                      <span className="text-xs text-warn font-semibold">Cocinando</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {itemsByStatus.served.length > 0 && (
              <div className="px-5 mb-4">
                <p className="text-[11px] font-bold uppercase tracking-wider text-olive mb-2">✓ Servido ({itemsByStatus.served.length})</p>
                <div className="bg-paper border border-border rounded-2xl divide-y divide-border opacity-70">
                  {itemsByStatus.served.map((it, i) => (
                    <div key={i} className="flex items-center justify-between p-3">
                      <p className="text-sm">{it.qty}× {it.name}</p>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {itemsByStatus.received.length > 0 && (
              <div className="px-5 mb-4">
                <p className="text-[11px] font-bold uppercase tracking-wider text-muted mb-2">Recibido ({itemsByStatus.received.length})</p>
                <div className="bg-paper border border-border rounded-2xl divide-y divide-border">
                  {itemsByStatus.received.map((it, i) => (
                    <div key={i} className="flex items-center justify-between p-3">
                      <p className="text-sm">{it.qty}× {it.name}</p>
                      <span className="text-xs text-muted">Esperando cocina</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            <div className="sticky bottom-0 bg-paper border-t border-border p-4 grid grid-cols-3 gap-2">
              <button className="py-3 bg-cream border border-border rounded-xl text-xs font-semibold inline-flex flex-col items-center gap-1" onClick={() => window._mesasmartUnhandled && window._mesasmartUnhandled() || alert("Función disponible próximamente · estamos completando esta acción")}>
                <Icon name="plus" size={16} />
                Agregar
              </button>
              <button className="py-3 bg-cream border border-border rounded-xl text-xs font-semibold inline-flex flex-col items-center gap-1" onClick={() => window._mesasmartUnhandled && window._mesasmartUnhandled() || alert("Función disponible próximamente · estamos completando esta acción")}>
                <Icon name="receipt" size={16} />
                Ver pedido
              </button>
              <button className="py-3 bg-clay text-white rounded-xl text-xs font-semibold inline-flex flex-col items-center gap-1" onClick={() => window._mesasmartUnhandled && window._mesasmartUnhandled() || alert("Función disponible próximamente · estamos completando esta acción")}>
                <Icon name="cash" size={16} />
                Cobrar
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─── UPSELL POP-UP ───
    function UpsellModal({ open, suggestions, triggerName, onAccept, onReject, onClose }) {
      if (!open || !suggestions || suggestions.length === 0) return null;
      return (
        <div className="fixed inset-0 z-50 bg-charcoal/70 backdrop-blur flex items-end sm:items-center justify-center p-4" onClick={onClose}>
          <div className="bg-paper rounded-3xl max-w-md w-full overflow-hidden shadow-2xl animate-slide-up" onClick={(e) => e.stopPropagation()} style={{ animation: 'slideUp 0.3s cubic-bezier(0.4,0,0.2,1)' }}>
            <div className="p-5 bg-gradient-to-br from-clay/10 via-gold/10 to-clay/5 border-b border-border">
              <div className="flex items-start gap-3">
                <div className="text-3xl">✨</div>
                <div className="flex-1">
                  <p className="text-[10px] font-extrabold uppercase tracking-widest text-clay">Sugerencia inteligente</p>
                  <p className="font-display text-lg font-semibold mt-0.5 leading-tight">¿Le ofrezco algo más con su <span className="text-clay">{triggerName}</span>?</p>
                </div>
              </div>
            </div>
            <div className="p-5 space-y-3">
              {suggestions.map((s, idx) => {
                const item = MOZO_MENU.find(m => m.id === s.id);
                if (!item) return null;
                return (
                  <button
                    key={s.id}
                    onClick={() => onAccept(s, item)}
                    className="w-full flex items-center gap-3 p-3 bg-cream hover:bg-clay/5 border border-border hover:border-clay rounded-2xl text-left transition group"
                  >
                    <div className="w-12 h-12 rounded-xl bg-paper overflow-hidden flex items-center justify-center text-2xl flex-shrink-0">{s.emoji}</div>
                    <div className="flex-1 min-w-0">
                      <p className="font-semibold text-sm">{item.name}</p>
                      <p className="text-xs text-muted leading-snug mt-0.5">"{s.message}"</p>
                      <div className="flex items-center gap-3 mt-1.5">
                        <span className="text-clay font-bold text-sm">{PEN(item.price)}</span>
                        {s.conversion >= 0.4 && <span className="text-[10px] bg-olive/15 text-olive px-1.5 py-0.5 rounded-full font-bold">⭐ {Math.round(s.conversion * 100)}% acepta</span>}
                      </div>
                    </div>
                    <div className="text-clay group-hover:translate-x-1 transition">→</div>
                  </button>
                );
              })}
            </div>
            <div className="p-4 pt-0 grid grid-cols-2 gap-2">
              <button onClick={onReject} className="py-2.5 bg-cream border border-border text-muted rounded-lg text-sm font-semibold hover:bg-border/40">El cliente no quiso</button>
              <button onClick={onClose} className="py-2.5 bg-cream border border-border text-muted rounded-lg text-sm font-semibold hover:bg-border/40">No ofrecí</button>
            </div>
          </div>
        </div>
      );
    }

    // TOMAR PEDIDO VIEW
    function TomarPedidoView({ tables, setTables, onSent }) {
      const [step, setStep] = useState("select");
      const [selectedTable, setSelectedTable] = useState(null);
      const [cart, setCart] = useState([]);
      const [search, setSearch] = useState("");
      const [activeCat, setActiveCat] = useState("todos");
      const [detailItem, setDetailItem] = useState(null);
      const [itemNotes, setItemNotes] = useState("");
      const [itemQty, setItemQty] = useState(1);
      const [servingMode, setServingMode] = useState("asReady");
      const [orderNotes, setOrderNotes] = useState("");
      // Upsell state
      const [upsellOpen, setUpsellOpen] = useState(false);
      const [upsellSuggestions, setUpsellSuggestions] = useState([]);
      const [upsellTriggerName, setUpsellTriggerName] = useState("");
      const [shownPairings, setShownPairings] = useState({});  // mainId → array of suggested ids ya mostrados
      const [upsellLog, setUpsellLog] = useState([]);          // {triggerId, suggestedId, outcome, ts}

      const myTables = tables.filter(t => t.server === ME.name);

      const filteredMenu = MOZO_MENU.filter(m => {
        const matchCat = activeCat === "todos" || m.cat === activeCat;
        const matchSearch = m.name.toLowerCase().includes(search.toLowerCase());
        return matchCat && matchSearch;
      });

      // ─── Upsell trigger logic ───
      const triggerUpsellIfApplicable = (item) => {
        const pairings = MOZO_PAIRINGS[item.id];
        if (!pairings || pairings.length === 0) return;
        // Filtrar las que ya están en el carrito o ya se mostraron
        const cartIds = new Set(cart.map(c => c.item.id));
        const alreadyShown = new Set(shownPairings[item.id] || []);
        const fresh = pairings.filter(p => !cartIds.has(p.id) && !alreadyShown.has(p.id));
        if (fresh.length === 0) return;

        setUpsellSuggestions(fresh.slice(0, 3));
        setUpsellTriggerName(item.name);
        setUpsellOpen(true);
        setShownPairings(prev => ({
          ...prev,
          [item.id]: [...(prev[item.id] || []), ...fresh.map(p => p.id)]
        }));

        // Backend tracking (best-effort)
        if (window.MesaSmartAPI && window.MesaSmartAPI.token) {
          fresh.slice(0, 3).forEach(p => {
            fetch((window.MesaSmartAPI.baseUrl || '') + '/api/engagement/upsell', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + window.MesaSmartAPI.token },
              body: JSON.stringify({
                triggerItemId: String(item.id),
                suggestedItemId: String(p.id)
              })
            }).catch(() => {});
          });
        }
      };

      const handleUpsellAccept = (suggestion, item) => {
        // Agregar al carrito
        setCart(prev => [...prev, { item, qty: 1, notes: "[Sugerencia del mozo]" }]);
        setUpsellLog(prev => [...prev, { suggestedId: suggestion.id, outcome: "ACCEPTED", ts: Date.now() }]);
        setUpsellOpen(false);
      };
      const handleUpsellReject = () => {
        setUpsellLog(prev => [...prev, { outcome: "REJECTED", ts: Date.now() }]);
        setUpsellOpen(false);
      };
      const handleUpsellClose = () => {
        setUpsellLog(prev => [...prev, { outcome: "IGNORED", ts: Date.now() }]);
        setUpsellOpen(false);
      };

      const handleAddItem = () => {
        if (!detailItem) return;
        const existingIdx = cart.findIndex(c => c.item.id === detailItem.id && c.notes === itemNotes);
        const justAdded = detailItem;
        if (existingIdx >= 0) {
          setCart(prev => {
            const newCart = [...prev];
            newCart[existingIdx].qty += itemQty;
            return newCart;
          });
        } else {
          setCart(prev => [...prev, { item: detailItem, qty: itemQty, notes: itemNotes }]);
        }
        setDetailItem(null);
        setItemNotes("");
        setItemQty(1);

        // Trigger upsell si el item agregado tiene pairings
        setTimeout(() => triggerUpsellIfApplicable(justAdded), 200);
      };

      const handleRemoveItem = (idx) => {
        setCart(prev => prev.filter((_, i) => i !== idx));
      };

      const handleQuantityChange = (idx, newQty) => {
        if (newQty <= 0) {
          handleRemoveItem(idx);
        } else {
          setCart(prev => {
            const newCart = [...prev];
            newCart[idx].qty = newQty;
            return newCart;
          });
        }
      };

      const subtotal = cart.reduce((s, c) => s + (c.item.price * c.qty), 0);
      const igv = subtotal * 0.18;
      const total = subtotal + igv;

      const handleSendOrder = async () => {
        if (!selectedTable || cart.length === 0) return;

        const orderData = {
          tableId: selectedTable.id,
          partySize: selectedTable.party || 1,
          items: cart.map(c => ({
            menuItemId: c.item.id,
            qty: c.qty,
            notes: c.notes || (servingMode === "together" ? "[Servir todo junto]" : "[Servir según salgan]"),
            course: c.item.cat === "bebidas" ? "DRINKS" : c.item.cat === "postres" ? "DESSERT" : "MAIN"
          })),
          globalNotes: orderNotes,
          servingMode: servingMode
        };

        try {
          if (window.MesaSmartAPI && window.MesaSmartAPI.orders) {
            await window.MesaSmartAPI.orders.create(orderData);
          }
        } catch (e) {
          console.log("Backend unavailable, simulating local save");
        }

        onSent();
        setCart([]);
        setOrderNotes("");
        setStep("select");
        setSelectedTable(null);
        setSearch("");
        setActiveCat("todos");
      };

      // PASO A: SELECCIONAR MESA
      if (step === "select") {
        // Mesas LIBRES de cualquier mozo · auto-asignación al tomar pedido
        const freeTables = tables.filter(t => t.status === "free" || !t.server);
        // Mis mesas activas (con cliente)
        const myActiveTables = myTables.filter(t => t.status !== "free");

        const startOrderForTable = (t, claimAsMine = false) => {
          if (claimAsMine && (!t.server || t.status === "free")) {
            // Auto-asigna la mesa a mí
            setTables(prev => prev.map(x => x.id === t.id ? { ...x, server: ME.name, status: "occupied", time: 0, party: x.party || 2 } : x));
          }
          setSelectedTable({ ...t, server: ME.name });
          setStep("menu");
          setCart([]);
          setUpsellLog([]);
          setShownPairings({});
        };

        return (
          <div className="px-5 py-5 space-y-5 pb-32">
            {/* Hero: tomar pedido walk-in o nueva mesa */}
            <div className="bg-gradient-to-br from-clay to-clay-dark text-white rounded-2xl p-5 shadow-lg">
              <p className="text-[10px] font-extrabold uppercase tracking-widest opacity-90">Atender cliente</p>
              <p className="font-display text-xl font-bold mt-1 leading-tight">¿Cliente sentado? Toma su pedido en segundos.</p>
              <p className="text-xs opacity-85 mt-1">Selecciona la mesa donde está sentado o escoge una libre y se le asigna a ti automáticamente.</p>
            </div>

            {/* Tabs internos · cambiar entre mis mesas y todas las libres */}
            {(myActiveTables.length > 0 || myTables.length > 0) && (
              <div>
                <div className="flex items-center justify-between mb-3">
                  <h2 className="font-display text-lg font-semibold">Mis mesas activas</h2>
                  <span className="text-xs text-muted">{myActiveTables.length} con cliente</span>
                </div>
                <div className="space-y-2">
                  {myActiveTables.length === 0 ? (
                    <div className="bg-paper border border-dashed border-border rounded-2xl p-5 text-center">
                      <p className="text-2xl mb-1">🪑</p>
                      <p className="text-sm font-semibold">Aún no tienes clientes</p>
                      <p className="text-xs text-muted mt-1">Asígnate una mesa libre abajo cuando llegue alguien</p>
                    </div>
                  ) : (
                    myActiveTables.map(t => (
                      <button
                        key={t.id}
                        onClick={() => startOrderForTable(t, false)}
                        className="w-full flex items-center gap-3 p-4 bg-paper border border-border rounded-2xl text-left hover:border-clay transition"
                      >
                        <div className="w-12 h-12 rounded-lg bg-clay/10 flex items-center justify-center text-clay font-bold text-lg">
                          {t.id}
                        </div>
                        <div className="flex-1 min-w-0">
                          <p className="font-semibold text-sm">Mesa {t.id}</p>
                          <p className="text-xs text-muted inline-flex items-center gap-1">
                            <Icon name="users" size={10} /> {t.party || 1}/{t.seats || 4} comensales · {t.time || 0}' en mesa
                          </p>
                        </div>
                        <Icon name="chevronRight" size={14} className="text-muted" />
                      </button>
                    ))
                  )}
                </div>
              </div>
            )}

            {/* Mesas libres del salón · auto-asignación */}
            <div>
              <div className="flex items-center justify-between mb-3">
                <h2 className="font-display text-lg font-semibold">Mesas libres del salón</h2>
                <span className="text-xs text-muted">{freeTables.length} disponibles</span>
              </div>
              {freeTables.length === 0 ? (
                <div className="bg-paper border border-border rounded-2xl p-6 text-center">
                  <p className="text-3xl mb-2">🍽️</p>
                  <p className="font-display text-base font-semibold">Salón lleno</p>
                  <p className="text-xs text-muted mt-1">Todas las mesas están ocupadas. Espera a que se libere alguna o usa "Walk-in" abajo.</p>
                </div>
              ) : (
                <div className="grid grid-cols-3 gap-2">
                  {freeTables.map(t => (
                    <button
                      key={t.id}
                      onClick={() => startOrderForTable(t, true)}
                      className="flex flex-col items-center gap-1 p-3 bg-paper border border-border hover:border-olive hover:bg-olive/5 rounded-xl transition active:scale-95"
                    >
                      <div className="w-10 h-10 rounded-lg bg-olive/10 flex items-center justify-center text-olive font-bold">
                        {t.id}
                      </div>
                      <p className="text-[10px] font-semibold uppercase tracking-wider text-olive">Libre</p>
                      <p className="text-[10px] text-muted">{t.seats || 4} sillas</p>
                    </button>
                  ))}
                </div>
              )}
            </div>

            {/* Walk-in · cliente nuevo sin mesa asignada */}
            <div>
              <h2 className="font-display text-lg font-semibold mb-3">Otras opciones</h2>
              <button
                onClick={() => {
                  // Crea una mesa virtual walk-in
                  const walkInId = `WI-${Date.now().toString(36).slice(-4).toUpperCase()}`;
                  const virtualTable = { id: walkInId, status: "occupied", server: ME.name, party: 1, seats: 1, time: 0, walkIn: true };
                  setTables(prev => [...prev, virtualTable]);
                  setSelectedTable(virtualTable);
                  setStep("menu");
                  setCart([]);
                  setUpsellLog([]);
                  setShownPairings({});
                }}
                className="w-full flex items-center gap-3 p-4 bg-charcoal text-cream rounded-2xl text-left hover:bg-charcoal/90 transition"
              >
                <div className="w-12 h-12 rounded-lg bg-cream/10 flex items-center justify-center text-cream font-bold">
                  🛍️
                </div>
                <div className="flex-1 min-w-0">
                  <p className="font-semibold text-sm">Walk-in / Para llevar</p>
                  <p className="text-xs text-cream/70">Cliente que pide para llevar o sin sentarse</p>
                </div>
                <Icon name="chevronRight" size={14} className="text-cream/70" />
              </button>
            </div>
          </div>
        );
      }

      // PASO B: CARTA · FULLSCREEN para máximo espacio de scroll
      if (step === "menu" && selectedTable) {
        const acceptedUpsells = upsellLog.filter(u => u.outcome === "ACCEPTED").length;

        // Sugerencias activas (collapsable)
        const cartIds = new Set(cart.map(c => c.item.id));
        const activeSuggestions = [];
        const seen = new Set();
        for (const c of cart) {
          const pairings = MOZO_PAIRINGS[c.item.id];
          if (!pairings) continue;
          for (const p of pairings) {
            if (cartIds.has(p.id) || seen.has(p.id)) continue;
            seen.add(p.id);
            activeSuggestions.push({ ...p, triggerName: c.item.name });
          }
        }
        const top3 = activeSuggestions.sort((a, b) => b.conversion - a.conversion).slice(0, 3);

        return (
          <div className="fixed inset-0 z-30 flex flex-col bg-cream">
            {/* Upsell modal */}
            <UpsellModal
              open={upsellOpen}
              suggestions={upsellSuggestions}
              triggerName={upsellTriggerName}
              onAccept={handleUpsellAccept}
              onReject={handleUpsellReject}
              onClose={handleUpsellClose}
            />

            {/* Header compacto · 1 fila, 56px alto */}
            <div className="bg-charcoal text-cream px-3 py-2.5 flex items-center gap-2 border-b border-charcoal/20">
              <button onClick={() => { setStep("select"); setSelectedTable(null); }} className="w-9 h-9 rounded-full bg-cream/10 flex items-center justify-center active:scale-90 transition">
                <Icon name="chevronLeft" size={16} className="text-cream" />
              </button>
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2">
                  <span className="font-bold text-sm">Mesa {selectedTable.id}</span>
                  {selectedTable.walkIn && <span className="text-[9px] bg-cream/15 px-1.5 py-0.5 rounded-full font-bold uppercase">Walk-in</span>}
                  <span className="text-[10px] text-cream/60">· {selectedTable.party || 1} comensales</span>
                </div>
                {acceptedUpsells > 0 && (
                  <p className="text-[10px] text-gold font-semibold flex items-center gap-1 mt-0.5">
                    ✨ {acceptedUpsells} upsell aceptado{acceptedUpsells > 1 ? 's' : ''}
                  </p>
                )}
              </div>
              {cart.length > 0 && (
                <button onClick={() => setStep("confirm")} className="px-3 py-1.5 bg-gold text-charcoal rounded-full text-xs font-extrabold flex items-center gap-1 active:scale-95 transition">
                  <span>{cart.length}</span>
                  <span>· {PEN(total)}</span>
                </button>
              )}
            </div>

            {/* Search + Categorías · 1 fila compacta */}
            <div className="bg-paper border-b border-border px-3 py-2 space-y-2">
              <div className="relative">
                <Icon name="search" size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-muted" />
                <input
                  type="text"
                  value={search}
                  onChange={(e) => setSearch(e.target.value)}
                  placeholder="Buscar plato..."
                  className="w-full pl-9 pr-4 py-2 bg-cream border border-border rounded-lg text-sm focus:border-clay focus:outline-none"
                />
              </div>
              <div className="flex gap-1.5 overflow-x-auto no-scrollbar -mx-3 px-3">
                {MOZO_CATEGORIES.map(cat => (
                  <button
                    key={cat.id}
                    onClick={() => setActiveCat(cat.id)}
                    className={`px-3 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap transition flex-shrink-0 ${
                      activeCat === cat.id ? 'bg-clay text-white' : 'bg-cream border border-border text-muted'
                    }`}
                  >
                    {cat.name}
                  </button>
                ))}
              </div>
            </div>

            {/* Banner sugerencias · COLAPSABLE para no comer espacio */}
            {top3.length > 0 && (
              <details className="bg-gradient-to-br from-clay/8 via-gold/8 to-clay/4 border-b border-clay/15">
                <summary className="px-3 py-2 cursor-pointer flex items-center gap-2 list-none">
                  <span className="text-base">✨</span>
                  <p className="text-[11px] font-bold uppercase tracking-widest text-clay flex-1">Sugiere · {top3.length} oportunidades</p>
                  <span className="text-clay text-xs">▾</span>
                </summary>
                <div className="px-3 pb-2 flex gap-1.5 overflow-x-auto no-scrollbar">
                  {top3.map(s => {
                    const item = MOZO_MENU.find(m => m.id === s.id);
                    if (!item) return null;
                    return (
                      <button
                        key={s.id}
                        onClick={() => {
                          setCart(prev => [...prev, { item, qty: 1, notes: "[Sugerencia del mozo]" }]);
                          setUpsellLog(prev => [...prev, { suggestedId: s.id, outcome: "ACCEPTED", ts: Date.now() }]);
                        }}
                        className="flex-shrink-0 flex items-center gap-1.5 bg-paper border border-border hover:border-clay rounded-lg px-2 py-1.5 transition active:scale-95"
                      >
                        <span className="text-base">{s.emoji}</span>
                        <div className="text-left">
                          <p className="text-[11px] font-bold text-ink leading-tight">{item.name}</p>
                          <p className="text-[9px] text-muted">{PEN(item.price)} · ⭐ {Math.round(s.conversion * 100)}%</p>
                        </div>
                        <span className="text-clay text-xs">+</span>
                      </button>
                    );
                  })}
                </div>
              </details>
            )}

            {/* Menu Grid · MAX SCROLL · cards más compactos */}
            <div className="flex-1 overflow-y-auto overscroll-contain p-3" style={{ paddingBottom: cart.length > 0 ? '76px' : '12px' }}>
              <div className="grid grid-cols-2 gap-2.5">
                {filteredMenu.map(item => {
                  const inCart = cart.find(c => c.item.id === item.id);
                  return (
                    <button
                      key={item.id}
                      onClick={() => { setDetailItem(item); setItemNotes(""); setItemQty(1); }}
                      className="relative bg-paper border border-border rounded-xl overflow-hidden text-left active:scale-95 transition shadow-sm"
                    >
                      {inCart && (
                        <div className="absolute top-1.5 right-1.5 z-10 w-6 h-6 bg-olive text-white text-xs font-extrabold rounded-full flex items-center justify-center shadow-lg">
                          {inCart.qty}
                        </div>
                      )}
                      <div className="relative aspect-[4/3] overflow-hidden bg-cream/50">
                        <img src={item.img} alt={item.name} onError={(e) => { e.target.style.display = "none"; }} className="w-full h-full object-cover" />
                        <div className="absolute bottom-1 left-1 px-1.5 py-0.5 bg-black/55 backdrop-blur text-white text-[9px] rounded font-bold">
                          {item.time}'
                        </div>

              {/* Notas y modo de servir */}

    function LlamadosView({ calls, onResolve }) {
      const urgent = calls.filter(c => c.urgent);
      const regular = calls.filter(c => !c.urgent);

        <div className="px-5 py-5 space-y-5">
          {calls.length === 0 ? (

              <p className="text-sm text-muted mt-1">No hay llamados pendientes</p>
            </div>
          ) : (
            <>
              {urgent.length > 0 && (
                <div>
                  <p className="text-[11px] font-bold uppercase tracking-wider text-danger mb-2">Urgentes ({urgent.length})</p>
                  <div className="space-y-3">
                    {urgent.map(c => <CallCard key={c.id} call={c} onResolve={onResolve} />)}
                  </div>

              )}
              {regular.length > 0 && (
                <div>
                  <p className="text-[11px] font-bold uppercase tracking-wider text-clay mb-2">Llamados ({regular.length})</p>
                  <div className="space-y-3">
