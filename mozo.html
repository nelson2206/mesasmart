<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Mozo · La Brasa Dorada</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>window.MESASMART_BACKEND_URL = "https://mesasmart-backend.onrender.com";</script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="./assets/api.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Playfair Display"', 'serif'],
            sans: ['Inter', 'system-ui', 'sans-serif']
          },
          colors: {
            cream: '#FAF7F2',
            paper: '#FFFFFF',
            charcoal: '#1F1A17',
            ink: '#2A1F1A',
            muted: '#6B5D52',
            clay: { DEFAULT: '#A0322B', dark: '#7E2820' },
            gold: '#C8941F',
            olive: '#2D7D5A',
            border: '#E8DFD3',
            sky: '#3B82F6',
            warn: '#D97706',
            danger: '#DC2626'
          }
        }
      }
    }
  </script>

  <style>
    html, body, #root { height: 100%; margin: 0; }
    body {
      background: #FAF7F2;
      color: #2A1F1A;
      font-family: 'Inter', system-ui, sans-serif;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }
    .font-display { font-family: 'Playfair Display', serif; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { scrollbar-width: none; }

    @keyframes pulseDot { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.4); opacity: 0.5; } }
    .pulse-dot { animation: pulseDot 1.2s infinite; }

    @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .slide-up { animation: slideUp .3s cubic-bezier(0.16, 1, 0.3, 1); }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-4px); }
      40%, 80% { transform: translateX(4px); }
    }
    .shake { animation: shake 0.5s; }

    /* Phone container */
    .phone-frame {
      max-width: 420px;
      margin: 0 auto;
      min-height: 100vh;
      background: #FAF7F2;
      box-shadow: 0 0 60px rgba(0,0,0,0.08);
      position: relative;
    }

    button { min-height: 40px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useMemo, useRef } = React;

    const Icon = ({ name, size = 18, className = "" }) => {
      const ics = {
        bell: <><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9zM13.73 21a2 2 0 0 1-3.46 0" /></>,
        check: <polyline points="20 6 9 17 4 12" />,
        clock: <><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></>,
        users: <><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" /></>,
        receipt: <><path d="M4 2v20l2-1.5L8 22l2-1.5L12 22l2-1.5L16 22l2-1.5L20 22V2l-2 1.5L16 2l-2 1.5L12 2l-2 1.5L8 2 6 3.5z" /><line x1="8" y1="7" x2="16" y2="7" /><line x1="8" y1="11" x2="16" y2="11" /></>,
        x: <><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></>,
        chevronRight: <polyline points="9 18 15 12 9 6" />,
        chevronDown: <polyline points="6 9 12 15 18 9" />,
        chef: <path d="M12 2a4 4 0 0 0-4 4v2a4 4 0 0 0-4 4v6a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-6a4 4 0 0 0-4-4V6a4 4 0 0 0-4-4z" />,
        utensils: <><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2M7 2v20M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3zm0 0v7" /></>,
        layout: <><rect x="3" y="3" width="18" height="18" rx="2" /><line x1="9" y1="3" x2="9" y2="21" /></>,
        cash: <><rect x="2" y="6" width="20" height="12" rx="2" /><circle cx="12" cy="12" r="2" /></>,
        plus: <><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></>,
        phone: <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />,
        alert: <><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" /><line x1="12" y1="9" x2="12" y2="13" /><line x1="12" y1="17" x2="12" y2="17" /></>,
        edit: <><path d="M12 20h9" /><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" /></>
      };
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          {ics[name]}
        </svg>
      );
    };

    const PEN = (n) => "S/ " + n.toFixed(2);

    // ───────────────────────────── DATA ─────────────────────────────
    const ME = { name: "María Quispe", role: "Mozo · Salón principal", shift: "16:00 - 24:00", color: "#A0322B" };

    // All 16 tables in the salón with grid coordinates (col x, row y)
    const ALL_TABLES_INIT = [
      { id: 1, x: 0, y: 0, seats: 4, status: "occupied", server: "María", party: 3, time: 12, total: 156.50, zone: "Ventana",
        items: [
          { name: "1/4 de Pollo a la Brasa", qty: 2, status: "ready" },
          { name: "Chicha Morada 1L", qty: 1, status: "ready" },
          { name: "Ensalada de la Casa", qty: 1, status: "preparing" }
        ]
      },
      { id: 2, x: 1, y: 0, seats: 4, status: "free", zone: "Ventana" },
      { id: 3, x: 2, y: 0, seats: 6, status: "occupied", server: "María", party: 5, time: 8, total: 245.80, zone: "Centro",
        items: [
          { name: "Pollo Entero", qty: 1, status: "preparing" },
          { name: "Salchipapa Familiar", qty: 1, status: "preparing" },
          { name: "Inca Kola 1.5L", qty: 1, status: "ready" }
        ]
      },
      { id: 4, x: 3, y: 0, seats: 2, status: "free", zone: "Centro" },
      { id: 5, x: 4, y: 0, seats: 4, status: "occupied", server: "Carlos", party: 4, time: 35, total: 198.00, zone: "Pared" },
      { id: 6, x: 0, y: 1, seats: 2, status: "cleaning", zone: "Ventana" },
      { id: 7, x: 1, y: 1, seats: 4, status: "alert", server: "María", party: 4, time: 22, total: 287.40, zone: "Centro",
        alert: "Llamó al mozo · Repetir bebida", alertTime: 1,
        items: [
          { name: "1/2 Pollo a la Brasa", qty: 2, status: "served" },
          { name: "Chicha Morada 1L", qty: 1, status: "served" },
          { name: "Limonada Frozen", qty: 1, status: "served" }
        ]
      },
      { id: 8, x: 2, y: 1, seats: 8, status: "reserved", zone: "Centro", reservation: "20:30 · Familia Rojas" },
      { id: 9, x: 3, y: 1, seats: 2, status: "occupied", server: "Carlos", party: 2, time: 18, total: 89.90, zone: "Centro" },
      { id: 10, x: 4, y: 1, seats: 4, status: "billing", server: "Juan", party: 4, time: 65, total: 412.50, zone: "Pared" },
      { id: 11, x: 0, y: 2, seats: 4, status: "free", zone: "Ventana" },
      { id: 12, x: 1, y: 2, seats: 6, status: "alert", server: "María", party: 6, time: 45, total: 356.20, zone: "Centro",
        alert: "Atraso en cocina · 4 min sobre el tiempo", alertTime: 4, urgent: true,
        items: [
          { name: "Combo Familiar", qty: 1, status: "preparing" },
          { name: "Anticuchos de Corazón", qty: 2, status: "preparing" }
        ]
      },
      { id: 13, x: 2, y: 2, seats: 2, status: "free", zone: "Centro" },
      { id: 14, x: 3, y: 2, seats: 4, status: "occupied", server: "María", party: 3, time: 5, total: 42.00, zone: "Pared",
        items: [
          { name: "1/4 de Pollo", qty: 1, status: "received" },
          { name: "Coca Cola Personal", qty: 1, status: "received" }
        ]
      },
      { id: 15, x: 4, y: 2, seats: 4, status: "free", zone: "Pared" },
      { id: 16, x: 5, y: 0, seats: 4, status: "occupied", server: "Carlos", party: 3, time: 28, total: 178.50, zone: "Terraza" }
    ];

    const CALLS = [
      { id: 1, mesa: 7, reason: "Repetir bebida", time: 1, urgent: false },
      { id: 2, mesa: 12, reason: "Atraso en cocina", time: 4, urgent: true },
    ];

    // ─────────────────────────── COMPONENTS ───────────────────────────

    function Header() {
      return (
        <header className="bg-charcoal text-cream px-5 pt-12 pb-5 sticky top-0 z-30">
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-3">
              <div className="relative">
                <div className="w-12 h-12 rounded-full flex items-center justify-center font-bold text-lg shadow-lg" style={{ background: "linear-gradient(135deg, #A0322B 0%, #C8941F 100%)", boxShadow: "0 6px 16px rgba(160,50,43,0.40)" }}>
                  {ME.name.split(" ").map(s => s[0]).slice(0,2).join("")}
                </div>
                <span className="absolute -bottom-0.5 -right-0.5 w-3.5 h-3.5 rounded-full bg-olive border-2 border-charcoal" title="En turno"></span>
              </div>
              <div>
                <p className="font-semibold text-base leading-tight">{ME.name}</p>
                <p className="text-[11px] text-cream/60">{ME.role}</p>
              </div>
            </div>
            <button className="relative w-11 h-11 rounded-full bg-cream/10 backdrop-blur flex items-center justify-center hover:bg-cream/20 transition" style={{ border: "1px solid rgba(250,247,242,0.15)" }}>
              <Icon name="bell" size={18} />
              {CALLS.length > 0 && <span className="absolute -top-0.5 -right-0.5 w-4 h-4 bg-clay rounded-full text-[10px] font-bold flex items-center justify-center" style={{ animation: "pulseDot 1.4s infinite" }}>{CALLS.length}</span>}
            </button>
          </div>
          <div className="mt-4 flex items-center gap-2.5 text-xs">
            <span className="inline-flex items-center gap-1.5 bg-olive/20 text-olive px-3 py-1 rounded-full font-semibold" style={{ border: "1px solid rgba(45,125,90,0.30)" }}>
              <span className="w-1.5 h-1.5 rounded-full bg-olive pulse-dot"></span> En turno
            </span>
            <span className="text-cream/60">{ME.shift}</span>
          </div>
        </header>
      );
    }

    function Tabs({ active, setActive, callCount, aiCount }) {
      const tabs = [
        { id: "asistente", label: "✨ Asistente", badge: aiCount },
        { id: "mesas", label: "Mis mesas" },
        { id: "plano", label: "Plano" },
        { id: "llamados", label: "Llamados", badge: callCount }
      ];
      return (
        <div className="bg-paper border-b border-border sticky top-[136px] z-20">
          <div className="flex">
            {tabs.map(t => (
              <button
                key={t.id}
                onClick={() => setActive(t.id)}
                className={`flex-1 py-3 text-xs font-semibold relative ${active === t.id ? 'text-clay' : 'text-muted'}`}
              >
                <span className="inline-flex items-center gap-1">
                  {t.label}
                  {t.badge > 0 && <span className="bg-clay text-white text-[9px] font-bold rounded-full w-4 h-4 flex items-center justify-center">{t.badge}</span>}
                </span>
                {active === t.id && <span className="absolute bottom-0 left-1/2 -translate-x-1/2 w-10 h-0.5 bg-clay rounded-full"></span>}
              </button>
            ))}
          </div>
        </div>
      );
    }

    // Status config for floor plan tables
    const tableStatusConfig = (table, isMine) => {
      if (table.blocked) return { bg: "bg-charcoal/10", border: "border-charcoal/30 border-dashed", text: "text-charcoal", label: "Bloqueada" };
      if (table.complaint) return { bg: "bg-danger/10", border: "border-danger", text: "text-danger", label: "Queja" };
      if (table.joinedWith) return { bg: "bg-gold/10", border: "border-gold", text: "text-gold", label: "Unida" };
      switch (table.status) {
        case "free": return { bg: "bg-paper", border: "border-border", text: "text-muted", label: "Libre" };
        case "occupied": return { bg: isMine ? "bg-clay/10" : "bg-paper", border: isMine ? "border-clay" : "border-border", text: isMine ? "text-clay" : "text-muted", label: "Ocupada" };
        case "billing": return { bg: "bg-gold/10", border: "border-gold", text: "text-gold", label: "Pidió cuenta" };
        case "cleaning": return { bg: "bg-cream", border: "border-border border-dashed", text: "text-muted", label: "Limpieza" };
        case "reserved": return { bg: "bg-sky/10", border: "border-sky", text: "text-sky", label: "Reservada" };
        case "alert": return { bg: "bg-clay/15", border: "border-clay", text: "text-clay", label: "Alerta" };
        default: return { bg: "bg-paper", border: "border-border", text: "text-muted", label: "" };
      }
    };

    // Floor plan tile
    function PlanTile({ table, isMine, onTap }) {
      const c = tableStatusConfig(table, isMine);
      const hasAlert = table.alert || table.complaint;
      return (
        <button
          onClick={() => onTap(table)}
          className={`relative aspect-square rounded-xl border-2 ${c.border} ${c.bg} p-2 text-left transition active:scale-95`}
        >
          {hasAlert && (
            <span className="absolute -top-1.5 -right-1.5 w-4 h-4 bg-danger rounded-full pulse-dot border-2 border-cream"></span>
          )}
          {table.joinedWith && (
            <span className="absolute -top-1.5 -left-1.5 w-5 h-5 bg-gold rounded-full text-white text-[10px] font-bold flex items-center justify-center border-2 border-cream">+</span>
          )}
          {isMine && !table.blocked && (
            <span className="absolute top-1 left-1 w-1.5 h-1.5 rounded-full bg-clay"></span>
          )}
          <div className="flex items-start justify-between">
            <span className="font-display text-lg font-bold">{table.id}</span>
          </div>
          <p className="text-[9px] text-muted -mt-1">{table.seats} asientos</p>
          {table.status === 'occupied' || table.status === 'billing' || table.status === 'alert' ? (
            <div className="mt-1">
              <p className={`text-[10px] font-semibold ${c.text}`}>{table.party}/{table.seats}</p>
              <p className="text-[9px] text-muted font-mono">{table.time}'</p>
            </div>
          ) : (
            <p className={`text-[10px] mt-1 font-semibold ${c.text}`}>{c.label}</p>
          )}
          {table.server && !isMine && (
            <p className="text-[8px] text-muted absolute bottom-1 right-1.5">{table.server.split(" ")[0]}</p>
          )}
        </button>
      );
    }

    // Floor plan view
    function PlanoView({ tables, onTap, joinMode, joinFirst }) {
      const cols = 6;
      const rows = 3;
      const grid = {};
      tables.forEach(t => { grid[`${t.x}-${t.y}`] = t; });

      const myTables = tables.filter(t => t.server === ME.name).length;
      const free = tables.filter(t => t.status === "free").length;
      const blocked = tables.filter(t => t.blocked).length;
      const joined = tables.filter(t => t.joinedWith).length;

      // Group by zone for zone labels
      const zones = ["Ventana", "Centro", "Pared", "Terraza"];

      return (
        <div className="px-5 py-5 space-y-5">
          {joinMode && (
            <div className="bg-gold/10 border-2 border-gold rounded-2xl p-4 anim-fade-in">
              <p className="font-bold text-gold text-sm">{joinFirst ? `Mesa ${joinFirst.id} seleccionada` : "Selecciona la primera mesa"}</p>
              <p className="text-xs text-muted mt-1">{joinFirst ? "Toca una segunda mesa adyacente para unir" : "Estás en modo unir mesas"}</p>
            </div>
          )}

          <div>
            <div className="flex items-center justify-between mb-3">
              <h2 className="font-display text-xl font-semibold">Plano del salón</h2>
              <span className="text-[11px] text-muted">{myTables} tuyas · {free} libres</span>
            </div>

            <div className="bg-paper border border-border rounded-2xl p-3">
              <div className="text-[10px] text-muted uppercase tracking-wider mb-2 px-2 flex items-center gap-1">
                <Icon name="layout" size={11} /> Vista superior · Salón principal
              </div>
              <div className="grid grid-cols-6 gap-1.5">
                {Array.from({ length: rows }).map((_, y) =>
                  Array.from({ length: cols }).map((_, x) => {
                    const t = grid[`${x}-${y}`];
                    if (!t) return <div key={`${x}-${y}`} className="aspect-square"></div>;
                    return <PlanTile key={t.id} table={t} isMine={t.server === ME.name} onTap={onTap} />;
                  })
                )}
              </div>
              {/* Legend */}
              <div className="mt-3 pt-3 border-t border-border flex flex-wrap gap-2 text-[10px] text-muted">
                <Legend dot="bg-clay" label="Mías" />
                <Legend dot="bg-border" label="Otras" />
                <Legend dot="bg-charcoal/30" label="Bloqueada" dashed />
                <Legend dot="bg-gold" label="Unida" />
                <Legend dot="bg-danger" label="Queja" />
              </div>
            </div>
          </div>

          {(blocked > 0 || joined > 0) && (
            <div className="grid grid-cols-2 gap-2 text-xs">
              {blocked > 0 && (
                <div className="bg-paper border border-border rounded-xl p-3">
                  <p className="text-muted text-[10px] uppercase">Bloqueadas</p>
                  <p className="font-display text-2xl font-bold mt-1">{blocked}</p>
                </div>
              )}
              {joined > 0 && (
                <div className="bg-paper border border-border rounded-xl p-3">
                  <p className="text-muted text-[10px] uppercase">Mesas unidas</p>
                  <p className="font-display text-2xl font-bold mt-1">{joined / 2}</p>
                </div>
              )}
            </div>
          )}

          <div className="text-[11px] text-muted bg-paper border border-border rounded-xl p-3 leading-relaxed">
            <p className="font-semibold text-ink mb-1">Tip para mozos nuevos</p>
            Las mesas marcadas con un <span className="inline-block w-1.5 h-1.5 rounded-full bg-clay mx-0.5"></span> son tuyas. Toca cualquier mesa para ver el detalle. Si juntas dos mesas físicamente, márcalas como "unidas" para que otros mozos no se confundan.
          </div>
        </div>
      );
    }

    function Legend({ dot, label, dashed }) {
      return (
        <span className="inline-flex items-center gap-1">
          <span className={`w-2 h-2 rounded-full ${dot} ${dashed ? 'border border-dashed border-charcoal/40' : ''}`}></span>
          {label}
        </span>
      );
    }

    // Action sheet for table operations
    function TableActionSheet({ open, table, onClose, onAction }) {
      if (!open || !table) return null;
      const isMine = table.server === ME.name;
      const c = tableStatusConfig(table, isMine);

      return (
        <div className="fixed inset-0 z-50 bg-charcoal/40 flex items-end" onClick={onClose}>
          <div onClick={(e) => e.stopPropagation()} className="slide-up bg-cream w-full max-w-[420px] mx-auto rounded-t-3xl max-h-[88vh] overflow-y-auto no-scrollbar">
            <div className="p-5 border-b border-border bg-paper sticky top-0 z-10">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-3">
                  <div className={`w-12 h-12 rounded-xl ${c.bg} ${c.border} border-2 flex items-center justify-center font-display text-xl font-bold ${c.text}`}>
                    {table.id}
                  </div>
                  <div>
                    <p className="font-display text-xl font-bold">Mesa {table.id}</p>
                    <p className="text-xs text-muted">{table.zone || "Salón"} · {table.seats} asientos · <span className={c.text}>{c.label}</span></p>
                  </div>
                </div>
                <button onClick={onClose} className="w-9 h-9 rounded-full bg-cream border border-border"><Icon name="x" size={16} className="mx-auto" /></button>
              </div>
            </div>

            {table.complaint && (
              <div className="m-5 p-3 bg-danger/10 border border-danger/30 rounded-xl">
                <p className="text-xs font-bold text-danger inline-flex items-center gap-1.5">
                  <Icon name="alert" size={12} /> Queja activa
                </p>
                <p className="text-sm mt-1">{table.complaint}</p>
                <button onClick={() => onAction("clearComplaint", table.id)} className="mt-2 text-xs text-olive font-semibold">
                  ✓ Resolver queja
                </button>
              </div>
            )}

            {table.joinedWith && (
              <div className="mx-5 mt-5 p-3 bg-gold/10 border border-gold/30 rounded-xl">
                <p className="text-xs font-bold text-gold">Unida con Mesa {table.joinedWith}</p>
                <p className="text-[11px] text-muted mt-0.5">Capacidad combinada: {table.seats + (table.joinedSeats || 0)} asientos</p>
                <button onClick={() => onAction("unjoin", table.id)} className="mt-2 text-xs text-clay font-semibold">
                  Separar mesas
                </button>
              </div>
            )}

            {table.blocked && (
              <div className="mx-5 mt-5 p-3 bg-charcoal/5 border border-charcoal/20 rounded-xl">

    // ════════════════════════════════════════════════════════
    //              ASISTENTE IA (Smart Service)
    // ════════════════════════════════════════════════════════
    // Basado en benchmark de 10 Steps of Service de la industria.
    // Genera recomendaciones priorizadas en tiempo real.

    const AI_DEFAULT_CONFIG = {
      // Cada tipo: { enabled, weight (0-100), thresholdMin (minutos) }
      complaint:        { enabled: true,  weight: 100, thresholdMin: 0 },
      callPending:      { enabled: true,  weight: 90,  thresholdMin: 1 },
      foodReady:        { enabled: true,  weight: 85,  thresholdMin: 2 },
      newTableGreet:    { enabled: true,  weight: 75,  thresholdMin: 0.5 },
      drinkDelay:       { enabled: true,  weight: 70,  thresholdMin: 5 },
      checkBack:        { enabled: true,  weight: 60,  thresholdMin: 5 },
      preBus:           { enabled: true,  weight: 45,  thresholdMin: 3 },
      offerDessert:     { enabled: true,  weight: 50,  thresholdMin: 8 },
      cleanTable:       { enabled: true,  weight: 55,  thresholdMin: 1 },
      refillDrink:      { enabled: true,  weight: 35,  thresholdMin: 10 },
      vipAttention:     { enabled: true,  weight: 80,  thresholdMin: 0 },
      walkRound:        { enabled: true,  weight: 30,  thresholdMin: 10 }
    };

    const AI_CONFIG_KEY = "mesasmart_ai_assistant_config_v1";
    function loadAIConfig() {
      try {
        if (typeof localStorage === "undefined") return AI_DEFAULT_CONFIG;
        const stored = localStorage.getItem(AI_CONFIG_KEY);
        if (!stored) return AI_DEFAULT_CONFIG;
        const parsed = JSON.parse(stored);
        // Merge defensively: cada tipo del default + override de stored
        const merged = {};
        Object.keys(AI_DEFAULT_CONFIG).forEach(k => {
          merged[k] = { ...AI_DEFAULT_CONFIG[k], ...(parsed[k] || {}) };
        });
        return merged;
      } catch (_e) {
        return AI_DEFAULT_CONFIG;
      }
    }

    /**
     * Algoritmo de recomendaciones del mozo.
     * Toma estado actual (mesas, llamados) y devuelve lista priorizada de acciones.
     */
    function generateRecommendations(args) {
      try {
        return _generateRecommendationsImpl(args);
      } catch (e) {
        console.error("[Asistente IA] error generando recomendaciones:", e);
        return [];
      }
    }
    function _generateRecommendationsImpl({ tables = [], calls = [], config = AI_DEFAULT_CONFIG, dismissed = new Set() } = {}) {
      const recs = [];
      const now = Date.now();
      const cfg = (k) => config[k] || AI_DEFAULT_CONFIG[k] || { enabled: true, weight: 50 };

      const myTables = tables.filter(t => t.server === ME.name);

      // 1. Quejas activas → urgente
      myTables.filter(t => t.complaint && cfg("complaint").enabled).forEach(t => {
        recs.push({
          id: `complaint-${t.id}`,
          type: "complaint",
          urgency: "critical",
          icon: "alert",
          title: `Atender queja en Mesa ${t.id}`,
          desc: t.complaint,
          mesa: t.id,
          actions: ["resolved", "later"],
          score: cfg("complaint").weight + 50,
          ageLabel: "AHORA"
        });
      });

      // 2. Llamados pendientes
      calls.filter(c => cfg("callPending").enabled).forEach(c => {
        const ageMin = Math.max(c.time, 0);
        recs.push({
          id: `call-${c.id}`,
          type: "callPending",
          urgency: c.urgent || ageMin > 3 ? "high" : "medium",
          icon: "bell",
          title: `Mesa ${c.mesa} te llamó`,
          desc: c.reason,
          mesa: c.mesa,
          actions: ["resolved", "later"],
          score: cfg("callPending").weight + ageMin * 5,
          ageLabel: `hace ${ageMin} min`
        });
      });

      // 3. Platos listos para servir (>2 min en cocina = urgente)
      myTables.forEach(t => {
        if (!cfg("foodReady").enabled) return;
        const readyItems = (t.items || []).filter(i => i.status === "ready");
        if (readyItems.length === 0) return;
        const urgency = readyItems.length >= 2 ? "high" : "medium";
        recs.push({
          id: `ready-${t.id}`,
          type: "foodReady",
          urgency,
          icon: "utensils",
          title: `Llevar ${readyItems.length} ${readyItems.length === 1 ? 'plato listo' : 'platos listos'}`,
          desc: `Mesa ${t.id} · ${readyItems.map(i => i.qty + '× ' + i.name).join(', ')}`,
          mesa: t.id,
          actions: ["served", "later"],
          score: cfg("foodReady").weight + readyItems.length * 5,
          ageLabel: "Listo"
        });
      });

      // 4. Mesa nueva ocupada — saludar y tomar pedido
      myTables.forEach(t => {
        if (!cfg("newTableGreet").enabled) return;
        if (t.status !== "occupied" || t.time > 3) return;
        if (t.items && t.items.length > 0) return; // ya pidió
        recs.push({
          id: `greet-${t.id}`,
          type: "newTableGreet",
          urgency: t.time > 1 ? "high" : "medium",
          icon: "users",
          title: `Saludar a Mesa ${t.id}`,
          desc: `${t.party} comensales recién sentados · ofrecer agua y tomar bebidas`,
          mesa: t.id,
          actions: ["done", "later"],
          score: cfg("newTableGreet").weight + t.time * 8,
          ageLabel: `hace ${t.time} min`
        });
      });

      // 5. Bebida demorada (cliente pidió hace >5 min y aún no llega)
      myTables.forEach(t => {
        if (!cfg("drinkDelay").enabled) return;
        const drinks = (t.items || []).filter(i => /chicha|limonada|kola|coca|cerveza|agua/i.test(i.name));
        const pending = drinks.find(i => i.status === "preparing" || i.status === "received");
        if (!pending) return;
        if (t.time < cfg("drinkDelay").thresholdMin) return;
        recs.push({
          id: `drink-${t.id}`,
          type: "drinkDelay",
          urgency: "medium",
          icon: "alert",
          title: `Apurar bebida Mesa ${t.id}`,
          desc: `${pending.name} pendiente hace ${t.time} min · ir a barra`,
          mesa: t.id,
          actions: ["done", "later"],
          score: cfg("drinkDelay").weight + t.time * 3,
          ageLabel: `${t.time} min`
        });
      });

      // 6. Check-back de 2 minutos (después de servir plato fuerte)
      myTables.forEach(t => {
        if (!cfg("checkBack").enabled) return;
        const served = (t.items || []).filter(i => i.status === "served");
        if (served.length === 0) return;
        if (t.time < 5 || t.time > 12) return; // ventana de check-back
        recs.push({
          id: `checkback-${t.id}`,
          type: "checkBack",
          urgency: "medium",
          icon: "users",
          title: `Check-back Mesa ${t.id}`,
          desc: `Pasar a preguntar "¿todo bien con la comida?" · regla 2 minutos`,
          mesa: t.id,
          actions: ["done", "later"],
          score: cfg("checkBack").weight + Math.min(20, t.time)
        });
      });

      // 7. Mesa pagada → limpiar para próximo turno
      tables.forEach(t => {
        if (!cfg("cleanTable").enabled) return;
        if (t.status !== "cleaning") return;
        recs.push({
          id: `clean-${t.id}`,
          type: "cleanTable",
          urgency: "medium",
          icon: "x",
          title: `Limpiar Mesa ${t.id}`,
          desc: `Lista para próximo turno · pasa a alistar`,
          mesa: t.id,
          actions: ["done", "later"],
          score: cfg("cleanTable").weight,
          ageLabel: "Por hacer"
        });
      });

      // 8. Ofrecer postre (>15 min ocupado, comieron principal)
      myTables.forEach(t => {
        if (!cfg("offerDessert").enabled) return;
        if (t.time < 15 || t.time > 35) return;
        const ate = (t.items || []).filter(i => i.status === "served").length;
        const dessert = (t.items || []).find(i => /postre|torta|suspiro|cheesecake|mazamorra/i.test(i.name));
        if (ate < 1 || dessert) return;
        recs.push({
          id: `dessert-${t.id}`,
          type: "offerDessert",
          urgency: "low",
          icon: "users",
          title: `Ofrecer postre · Mesa ${t.id}`,
          desc: `Sugerir suspiro a la limeña, mazamorra o cheesecake (sube ticket promedio)`,
          mesa: t.id,
          actions: ["done", "later"],
          score: cfg("offerDessert").weight
        });
      });

      // 9. Ronda general — ninguna mesa atendida en >7 min
      const longestSinceCheck = Math.max(...myTables.map(t => t.time || 0), 0);
      if (cfg("walkRound").enabled && longestSinceCheck > 8 && myTables.length > 1) {
        recs.push({
          id: `round-${Date.now()}`,
          type: "walkRound",
          urgency: "low",
          icon: "users",
          title: `Ronda por tus mesas`,
          desc: `${myTables.length} mesas en tu sección · pasa a chequear si todo está bien`,
          actions: ["done", "later"],
          score: cfg("walkRound").weight + longestSinceCheck
        });
      }

      // Filter dismissed
      return recs.filter(r => !dismissed.has(r.id)).sort((a, b) => b.score - a.score);
    }

    function AsistenteView({ tables, calls, onAction }) {
      const [config] = useState(loadAIConfig);
      const [dismissed, setDismissed] = useState(new Set());
      const [snoozed, setSnoozed] = useState({}); // id → expireTime
      const [tick, setTick] = useState(0);

      useEffect(() => {
        const i = setInterval(() => setTick(t => t + 1), 30000); // refresh every 30s
        return () => clearInterval(i);
      }, []);

      const recs = useMemo(() => {
        const now = Date.now();
        // Clean expired snoozes
        const activeDismissed = new Set(dismissed);
        Object.entries(snoozed).forEach(([id, exp]) => {
          if (now < exp) activeDismissed.add(id);
        });
        return generateRecommendations({ tables, calls, config, dismissed: activeDismissed });
      }, [tables, calls, config, dismissed, snoozed, tick]);

      const handleAction = (rec, action) => {
        if (action === "later") {
          setSnoozed(prev => ({ ...prev, [rec.id]: Date.now() + 5 * 60 * 1000 }));
        } else if (action === "dismiss") {
          setDismissed(prev => new Set([...prev, rec.id]));
        } else {
          // done / served / resolved → mark and remove from list
          setDismissed(prev => new Set([...prev, rec.id]));
          if (onAction) onAction(rec, action);
        }
      };

      const stats = {
        total: recs.length,
        critical: recs.filter(r => r.urgency === "critical").length,
        high: recs.filter(r => r.urgency === "high").length
      };

      return (
        <div className="px-5 py-5 space-y-4">
          {/* AI Hero card */}
          <div className="bg-gradient-to-br from-clay to-clay-dark text-white rounded-2xl p-5 relative overflow-hidden">
            <div className="absolute -top-10 -right-10 w-32 h-32 rounded-full bg-gold/30 blur-2xl"></div>
            <div className="relative">
              <div className="flex items-center gap-2 text-[11px] uppercase tracking-wider text-cream/80 font-bold">
                <span className="w-2 h-2 rounded-full bg-cream animate-pulse"></span>
                Asistente IA · en vivo
              </div>
              <h2 className="font-display text-2xl font-bold mt-2 leading-tight">
                {recs.length === 0 ? "Todo bajo control 👌" : `${recs.length} ${recs.length === 1 ? 'cosa pendiente' : 'cosas pendientes'}`}
              </h2>
              {stats.critical > 0 && (
                <p className="text-sm text-cream/90 mt-1">
                  ⚠️ {stats.critical} {stats.critical === 1 ? 'urgente' : 'urgentes'} · atender ahora
                </p>
              )}
              {stats.critical === 0 && stats.high > 0 && (
                <p className="text-sm text-cream/90 mt-1">{stats.high} {stats.high === 1 ? 'recomendación' : 'recomendaciones'} prioritarias</p>
              )}
            </div>
          </div>

          {/* Recommendations list */}
          {recs.length === 0 ? (
            <div className="text-center py-16 bg-paper border border-border rounded-2xl">
              <div className="w-14 h-14 mx-auto rounded-full bg-olive/10 text-olive flex items-center justify-center">
                <Icon name="check" size={26} />
              </div>
              <p className="font-display text-xl font-semibold mt-4">Excelente trabajo</p>
              <p className="text-sm text-muted mt-1">No hay acciones pendientes ahora</p>
              <p className="text-[11px] text-muted mt-3">El asistente revisa cada 30 segundos</p>
            </div>
          ) : (
            recs.map(rec => <RecCard key={rec.id} rec={rec} onAction={handleAction} />)
          )}

          {/* Footer info */}
          {recs.length > 0 && (
            <div className="text-[11px] text-muted text-center pt-2">
              💡 Tip: toca "No ahora" para posponer 5 min · "Hecho" cuando lo hagas
            </div>
          )}
        </div>
      );
    }

    function RecCard({ rec, onAction }) {
      const colorMap = {
        critical: { bg: "bg-danger/10 border-danger", text: "text-danger", label: "URGENTE" },
        high:     { bg: "bg-clay/10 border-clay", text: "text-clay", label: "ALTA" },
        medium:   { bg: "bg-warn/10 border-warn", text: "text-warn", label: "MEDIA" },
        low:      { bg: "bg-paper border-border", text: "text-muted", label: "" }
      };
      const c = colorMap[rec.urgency];
      return (
        <div className={`border-2 rounded-2xl p-4 ${c.bg} ${rec.urgency === 'critical' ? 'shake' : ''}`}>
          <div className="flex items-start gap-3">
            <div className={`w-11 h-11 rounded-xl bg-paper border border-border flex items-center justify-center shrink-0 ${c.text}`}>
              <Icon name={rec.icon} size={20} />
            </div>
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-2 flex-wrap">
                {c.label && <span className={`text-[9px] font-bold uppercase tracking-wider px-1.5 py-0.5 rounded ${c.text} bg-paper`}>{c.label}</span>}
                {rec.ageLabel && <span className="text-[10px] text-muted font-mono">{rec.ageLabel}</span>}
              </div>
              <p className="font-bold text-sm mt-1 leading-tight">{rec.title}</p>
              <p className="text-xs text-muted mt-1 leading-relaxed">{rec.desc}</p>
            </div>
          </div>
          <div className="mt-3 grid grid-cols-3 gap-2">
            <button onClick={() => onAction(rec, "later")} className="py-2 bg-paper border border-border rounded-lg text-xs font-semibold text-muted hover:bg-cream">
              No ahora
            </button>
            <button onClick={() => onAction(rec, "dismiss")} className="py-2 bg-paper border border-border rounded-lg text-xs font-semibold text-muted hover:bg-cream">
              Descartar
            </button>
            <button onClick={() => onAction(rec, rec.actions[0] || "done")} className="py-2 bg-olive text-white rounded-lg text-xs font-bold inline-flex items-center justify-center gap-1">
              <Icon name="check" size={12} /> Hecho
            </button>
          </div>
        </div>
      );
    }

    function PedidosView() {
      const recent = [
        { id: "T-1042", mesa: 7, time: "21:28", total: 287.40, status: "served" },
        { id: "T-1043", mesa: 12, time: "21:30", total: 198.00, status: "ready" },
        { id: "T-1044", mesa: 3, time: "21:34", total: 245.80, status: "preparing" },
        { id: "T-1045", mesa: 9, time: "21:38", total: 78.40, status: "preparing" },
        { id: "T-1047", mesa: 11, time: "21:42", total: 89.90, status: "preparing" }
      ];
      return (
        <div className="px-5 py-5 space-y-3">
          <h2 className="font-display text-lg font-semibold">Pedidos del turno</h2>
          {recent.map(p => (
            <div key={p.id} className="bg-paper border border-border rounded-2xl p-4 flex items-center gap-3">
              <div className="w-12 h-12 rounded-xl bg-cream flex items-center justify-center font-display font-bold">{p.mesa}</div>
              <div className="flex-1 min-w-0">
                <p className="font-semibold text-sm">Mesa {p.mesa}</p>
                <p className="text-[11px] text-muted">{p.time} · {p.id}</p>
              </div>
              <div className="text-right">
                <p className="font-display font-bold">{PEN(p.total)}</p>
                <ItemStatus status={p.status} />
              </div>
            </div>
          ))}
        </div>
      );
    }

    // ─────────────────────────── APP ───────────────────────────
    function App() {
      const [tab, setTab] = useState("asistente");
      const [tables, setTables] = useState(ALL_TABLES_INIT);
      const [calls, setCalls] = useState(CALLS);
      const [selectedTable, setSelectedTable] = useState(null); // for "mis mesas" detail
      const [actionTable, setActionTable] = useState(null);     // for plano action sheet
      const [blockTarget, setBlockTarget] = useState(null);
      const [complaintTarget, setComplaintTarget] = useState(null);
      const [editTarget, setEditTarget] = useState(null);
      const [joinFirst, setJoinFirst] = useState(null);
      const [toast, setToast] = useState(null);

      const myTables = tables.filter(t => t.server === ME.name);

      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2200); };

      const handleAction = (action, tableId) => {
        const table = tables.find(t => t.id === tableId);
        switch (action) {
          case "complaint":
            setActionTable(null);
            setComplaintTarget(table);
            break;
          case "clearComplaint":
            setTables(prev => prev.map(t => t.id === tableId ? { ...t, complaint: null } : t));
            setActionTable(null);
            showToast(`Queja resuelta · Mesa ${tableId}`);
            break;
          case "joinStart":
            setActionTable(null);
            setJoinFirst(table);
            setTab("plano");
            showToast(`Selecciona la segunda mesa a unir con M${tableId}`);
            break;
          case "unjoin": {
            const partnerId = table.joinedWith;
            setTables(prev => prev.map(t => {
              if (t.id === tableId || t.id === partnerId) return { ...t, joinedWith: null, joinedSeats: 0 };
              return t;
            }));
            setActionTable(null);
            showToast(`Mesas separadas`);
            break;
          }
          case "blockStart":
            setActionTable(null);
            setBlockTarget(table);
            break;
          case "unblock":
            setTables(prev => prev.map(t => t.id === tableId ? { ...t, blocked: false, blockedReason: null } : t));
            setActionTable(null);
            showToast(`Mesa ${tableId} desbloqueada`);
            break;
          case "editStart":
            setActionTable(null);
            setEditTarget(table);
            break;
          case "viewOrder":
            setActionTable(null);
            setSelectedTable(table);
            break;
        }
      };

      const handlePlanoTap = (table) => {
        // If in join mode and we have a first selection, complete the join
        if (joinFirst) {
          if (joinFirst.id === table.id) {
            setJoinFirst(null);
            return;
          }
          // Adjacency check (any adjacent x or y)
          const adjacent = Math.abs(joinFirst.x - table.x) + Math.abs(joinFirst.y - table.y) <= 2;
          if (!adjacent) {
            showToast("Las mesas deben estar cerca para unirse");
            return;
          }
          if (table.blocked || table.joinedWith) {
            showToast("Esta mesa no está disponible");
            return;
          }
          setTables(prev => prev.map(t => {
            if (t.id === joinFirst.id) return { ...t, joinedWith: table.id, joinedSeats: table.seats };
            if (t.id === table.id) return { ...t, joinedWith: joinFirst.id, joinedSeats: joinFirst.seats };
            return t;
          }));
          showToast(`Mesas ${joinFirst.id} y ${table.id} unidas · ${joinFirst.seats + table.seats} asientos`);
          setJoinFirst(null);
          return;
        }
        setActionTable(table);
      };

      return (
        <div className="phone-frame">
          <Header />
          <Tabs active={tab} setActive={setTab} callCount={calls.length} aiCount={tables.filter(t => t.complaint || (t.items && t.items.some(i => i.status === "ready"))).length + calls.length} />

          {tab === "asistente" && <AsistenteView tables={tables} calls={calls} onAction={(rec, action) => {
            if (action === "resolved" && rec.type === "callPending") {
              setCalls(prev => prev.filter(c => `call-${c.id}` !== rec.id));
            }
            if (action === "resolved" && rec.type === "complaint") {
              setTables(prev => prev.map(t => t.id === rec.mesa ? { ...t, complaint: null } : t));
            }
            showToast(`✓ ${rec.title}`);
          }} />}
          {tab === "mesas" && <MesasView tables={myTables} onTable={setSelectedTable} />}
          {tab === "plano" && <PlanoView tables={tables} onTap={handlePlanoTap} joinMode={!!joinFirst} joinFirst={joinFirst} />}
          {tab === "llamados" && <LlamadosView calls={calls} onResolve={(id) => setCalls(c => c.filter(x => x.id !== id))} />}

          <TableDetail table={selectedTable} onClose={() => setSelectedTable(null)} />
          <TableActionSheet open={!!actionTable} table={actionTable} onClose={() => setActionTable(null)} onAction={handleAction} />
          <BlockReasonModal
            open={!!blockTarget}
            onClose={() => setBlockTarget(null)}
            onConfirm={(reason) => {
              setTables(prev => prev.map(t => t.id === blockTarget.id ? { ...t, blocked: true, blockedReason: reason } : t));
              showToast(`Mesa ${blockTarget.id} bloqueada · ${reason}`);
              setBlockTarget(null);
            }}
          />
          <ComplaintModal
            open={!!complaintTarget}
            onClose={() => setComplaintTarget(null)}
            onConfirm={(reason) => {
              setTables(prev => prev.map(t => t.id === complaintTarget.id ? { ...t, complaint: reason } : t));
              showToast(`Queja registrada · Cocina notificada`);
              setComplaintTarget(null);
            }}
          />
          <EditCapacityModal
            open={!!editTarget}
            table={editTarget}
            onClose={() => setEditTarget(null)}
            onConfirm={(seats) => {
              setTables(prev => prev.map(t => t.id === editTarget.id ? { ...t, seats } : t));
              showToast(`Mesa ${editTarget.id} actualizada · ${seats} asientos`);
              setEditTarget(null);
            }}
          />

          {joinFirst && (
            <button
              onClick={() => setJoinFirst(null)}
              className="fixed bottom-4 left-1/2 -translate-x-1/2 z-40 px-5 py-3 bg-gold text-white text-sm font-bold rounded-full shadow-lg"
            >
              Cancelar unión de mesas
            </button>
          )}

          {toast && (
            <div className="fixed bottom-4 left-1/2 -translate-x-1/2 z-50 px-5 py-3 bg-charcoal text-cream text-sm font-medium rounded-full shadow-lg max-w-[90%] text-center">
              {toast}
            </div>
          )}
        </div>
      );
    }

    // Error boundary para capturar errores y mostrarlos
    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { error: null }; }
      static getDerivedStateFromError(error) { return { error }; }
      componentDidCatch(error, info) { console.error("[Mozo error boundary]", error, info); }
      render() {
        if (this.state.error) {
          return (
            <div style={{padding: 24, fontFamily: "system-ui", color: "#A0322B", maxWidth: 420, margin: "40px auto"}}>
              <h2 style={{fontWeight: 700, marginBottom: 12}}>⚠️ Error en la app</h2>
              <pre style={{background:"#fff", padding: 12, borderRadius: 8, fontSize: 12, overflow: "auto", whiteSpace: "pre-wrap"}}>{String(this.state.error && this.state.error.message ? this.state.error.message : this.state.error)}</pre>
              <button onClick={() => location.reload()} style={{marginTop: 12, padding: "10px 20px", background: "#A0322B", color: "white", border: "none", borderRadius: 8}}>Recargar</button>
            </div>
          );
        }
        return this.props.children;
      }
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
</body>
