    // ════════════════════════════════════════════════════════
    //              ASISTENTE IA (Smart Service)
    // ════════════════════════════════════════════════════════
    // Basado en benchmark de 10 Steps of Service de la industria.
    // Genera recomendaciones priorizadas en tiempo real.

    const AI_DEFAULT_CONFIG = {
      // Cada tipo: { enabled, weight (0-100), thresholdMin (minutos) }
      complaint:        { enabled: true,  weight: 100, thresholdMin: 0 },
      callPending:      { enabled: true,  weight: 90,  thresholdMin: 1 },
      foodReady:        { enabled: true,  weight: 85,  thresholdMin: 2 },
      newTableGreet:    { enabled: true,  weight: 75,  thresholdMin: 0.5 },
      drinkDelay:       { enabled: true,  weight: 70,  thresholdMin: 5 },
      checkBack:        { enabled: true,  weight: 60,  thresholdMin: 5 },
      preBus:           { enabled: true,  weight: 45,  thresholdMin: 3 },
      offerDessert:     { enabled: true,  weight: 50,  thresholdMin: 8 },
      cleanTable:       { enabled: true,  weight: 55,  thresholdMin: 1 },
      refillDrink:      { enabled: true,  weight: 35,  thresholdMin: 10 },
      vipAttention:     { enabled: true,  weight: 80,  thresholdMin: 0 },
      walkRound:        { enabled: true,  weight: 30,  thresholdMin: 10 }
    };

    const AI_CONFIG_KEY = "mesasmart_ai_assistant_config_v1";
    function loadAIConfig() {
      try {
        if (typeof localStorage === "undefined") return AI_DEFAULT_CONFIG;
        const stored = localStorage.getItem(AI_CONFIG_KEY);
        if (!stored) return AI_DEFAULT_CONFIG;
        const parsed = JSON.parse(stored);
        // Merge defensively: cada tipo del default + override de stored
        const merged = {};
        Object.keys(AI_DEFAULT_CONFIG).forEach(k => {
          merged[k] = { ...AI_DEFAULT_CONFIG[k], ...(parsed[k] || {}) };
        });
        return merged;
      } catch (_e) {
        return AI_DEFAULT_CONFIG;
      }
    }

    /**
     * Algoritmo de recomendaciones del mozo.
     * Toma estado actual (mesas, llamados) y devuelve lista priorizada de acciones.
     */
    function generateRecommendations(args) {
      try {
        return _generateRecommendationsImpl(args);
      } catch (e) {
        console.error("[Asistente IA] error generando recomendaciones:", e);
        return [];
      }
    }
    function _generateRecommendationsImpl({ tables = [], calls = [], config = AI_DEFAULT_CONFIG, dismissed = new Set() } = {}) {
      const recs = [];
      const now = Date.now();
      const cfg = (k) => config[k] || AI_DEFAULT_CONFIG[k] || { enabled: true, weight: 50 };

      const myTables = tables.filter(t => t.server === ME.name);

      // 1. Quejas activas → urgente
      myTables.filter(t => t.complaint && cfg("complaint").enabled).forEach(t => {
        recs.push({
          id: `complaint-${t.id}`,
          type: "complaint",
          urgency: "critical",
          icon: "alert",
          title: `Atender queja en Mesa ${t.id}`,
          desc: t.complaint,
          mesa: t.id,
          actions: ["resolved", "later"],
          score: cfg("complaint").weight + 50,
          ageLabel: "AHORA"
        });
      });

      // 2. Llamados pendientes
      calls.filter(c => cfg("callPending").enabled).forEach(c => {
        const ageMin = Math.max(c.time, 0);
        recs.push({
          id: `call-${c.id}`,
          type: "callPending",
          urgency: c.urgent || ageMin > 3 ? "high" : "medium",
          icon: "bell",
          title: `Mesa ${c.mesa} te llamó`,
          desc: c.reason,
          mesa: c.mesa,
          actions: ["resolved", "later"],
          score: cfg("callPending").weight + ageMin * 5,
          ageLabel: `hace ${ageMin} min`
        });
      });

      // 3. Platos listos para servir (>2 min en cocina = urgente)
      myTables.forEach(t => {
        if (!cfg("foodReady").enabled) return;
        const readyItems = (t.items || []).filter(i => i.status === "ready");
        if (readyItems.length === 0) return;
        const urgency = readyItems.length >= 2 ? "high" : "medium";
        recs.push({
          id: `ready-${t.id}`,
          type: "foodReady",
          urgency,
          icon: "utensils",
          title: `Llevar ${readyItems.length} ${readyItems.length === 1 ? 'plato listo' : 'platos listos'}`,
          desc: `Mesa ${t.id} · ${readyItems.map(i => i.qty + '× ' + i.name).join(', ')}`,
          mesa: t.id,
          actions: ["served", "later"],
          score: cfg("foodReady").weight + readyItems.length * 5,
          ageLabel: "Listo"
        });
      });

      // 4. Mesa nueva ocupada — saludar y tomar pedido
      myTables.forEach(t => {
        if (!cfg("newTableGreet").enabled) return;
        if (t.status !== "occupied" || t.time > 3) return;
        if (t.items && t.items.length > 0) return; // ya pidió
        recs.push({
          id: `greet-${t.id}`,
          type: "newTableGreet",
          urgency: t.time > 1 ? "high" : "medium",
          icon: "users",
          title: `Saludar a Mesa ${t.id}`,
          desc: `${t.party} comensales recién sentados · ofrecer agua y tomar bebidas`,
          mesa: t.id,
          actions: ["done", "later"],
          score: cfg("newTableGreet").weight + t.time * 8,
          ageLabel: `hace ${t.time} min`
        });
      });

      // 5. Bebida demorada (cliente pidió hace >5 min y aún no llega)
      myTables.forEach(t => {
        if (!cfg("drinkDelay").enabled) return;
        const drinks = (t.items || []).filter(i => /chicha|limonada|kola|coca|cerveza|agua/i.test(i.name));
        const pending = drinks.find(i => i.status === "preparing" || i.status === "received");
        if (!pending) return;
        if (t.time < cfg("drinkDelay").thresholdMin) return;
        recs.push({
          id: `drink-${t.id}`,
          type: "drinkDelay",
          urgency: "medium",
          icon: "alert",
          title: `Apurar bebida Mesa ${t.id}`,
          desc: `${pending.name} pendiente hace ${t.time} min · ir a barra`,
          mesa: t.id,
          actions: ["done", "later"],
          score: cfg("drinkDelay").weight + t.time * 3,
          ageLabel: `${t.time} min`
        });
      });

      // 6. Check-back de 2 minutos (después de servir plato fuerte)
      myTables.forEach(t => {
        if (!cfg("checkBack").enabled) return;
        const served = (t.items || []).filter(i => i.status === "served");
        if (served.length === 0) return;
        if (t.time < 5 || t.time > 12) return; // ventana de check-back
        recs.push({
          id: `checkback-${t.id}`,
          type: "checkBack",
          urgency: "medium",
          icon: "users",
          title: `Check-back Mesa ${t.id}`,
          desc: `Pasar a preguntar "¿todo bien con la comida?" · regla 2 minutos`,
          mesa: t.id,
          actions: ["done", "later"],
          score: cfg("checkBack").weight + Math.min(20, t.time)
        });
      });

      // 7. Mesa pagada → limpiar para próximo turno
      tables.forEach(t => {
        if (!cfg("cleanTable").enabled) return;
        if (t.status !== "cleaning") return;
        recs.push({
          id: `clean-${t.id}`,
          type: "cleanTable",
          urgency: "medium",
          icon: "x",
          title: `Limpiar Mesa ${t.id}`,
          desc: `Lista para próximo turno · pasa a alistar`,
          mesa: t.id,
          actions: ["done", "later"],
          score: cfg("cleanTable").weight,
          ageLabel: "Por hacer"
        });
      });

      // 8. Ofrecer postre (>15 min ocupado, comieron principal)
      myTables.forEach(t => {
        if (!cfg("offerDessert").enabled) return;
        if (t.time < 15 || t.time > 35) return;
        const ate = (t.items || []).filter(i => i.status === "served").length;
        const dessert = (t.items || []).find(i => /postre|torta|suspiro|cheesecake|mazamorra/i.test(i.name));
        if (ate < 1 || dessert) return;
        recs.push({
          id: `dessert-${t.id}`,
          type: "offerDessert",
          urgency: "low",
          icon: "users",
          title: `Ofrecer postre · Mesa ${t.id}`,
          desc: `Sugerir suspiro a la limeña, mazamorra o cheesecake (sube ticket promedio)`,
          mesa: t.id,
          actions: ["done", "later"],
          score: cfg("offerDessert").weight
        });
      });

      // 9. Ronda general — ninguna mesa atendida en >7 min
      const longestSinceCheck = Math.max(...myTables.map(t => t.time || 0), 0);
      if (cfg("walkRound").enabled && longestSinceCheck > 8 && myTables.length > 1) {
        recs.push({
          id: `round-${Date.now()}`,
          type: "walkRound",
          urgency: "low",
          icon: "users",
          title: `Ronda por tus mesas`,
          desc: `${myTables.length} mesas en tu sección · pasa a chequear si todo está bien`,
          actions: ["done", "later"],
          score: cfg("walkRound").weight + longestSinceCheck
        });
      }

      // Filter dismissed
      return recs.filter(r => !dismissed.has(r.id)).sort((a, b) => b.score - a.score);
    }

    function AsistenteView({ tables, calls, onAction }) {
      const [config] = useState(loadAIConfig);
      const [dismissed, setDismissed] = useState(new Set());
      const [snoozed, setSnoozed] = useState({}); // id → expireTime
      const [tick, setTick] = useState(0);

      useEffect(() => {
        const i = setInterval(() => setTick(t => t + 1), 30000); // refresh every 30s
        return () => clearInterval(i);
      }, []);

      const recs = useMemo(() => {
        const now = Date.now();
        // Clean expired snoozes
        const activeDismissed = new Set(dismissed);
        Object.entries(snoozed).forEach(([id, exp]) => {
          if (now < exp) activeDismissed.add(id);
        });
        return generateRecommendations({ tables, calls, config, dismissed: activeDismissed });
      }, [tables, calls, config, dismissed, snoozed, tick]);

      const handleAction = (rec, action) => {
        if (action === "later") {
          setSnoozed(prev => ({ ...prev, [rec.id]: Date.now() + 5 * 60 * 1000 }));
        } else if (action === "dismiss") {
          setDismissed(prev => new Set([...prev, rec.id]));
        } else {
          // done / served / resolved → mark and remove from list
          setDismissed(prev => new Set([...prev, rec.id]));
          if (onAction) onAction(rec, action);
        }
      };

      const stats = {
        total: recs.length,
        critical: recs.filter(r => r.urgency === "critical").length,
        high: recs.filter(r => r.urgency === "high").length
      };

      return (
        <div className="px-5 py-5 space-y-4">
          {/* AI Hero card */}
          <div className="bg-gradient-to-br from-clay to-clay-dark text-white rounded-2xl p-5 relative overflow-hidden">
            <div className="absolute -top-10 -right-10 w-32 h-32 rounded-full bg-gold/30 blur-2xl"></div>
            <div className="relative">
              <div className="flex items-center gap-2 text-[11px] uppercase tracking-wider text-cream/80 font-bold">
                <span className="w-2 h-2 rounded-full bg-cream animate-pulse"></span>
                Asistente IA · en vivo
              </div>
              <h2 className="font-display text-2xl font-bold mt-2 leading-tight">
                {recs.length === 0 ? "Todo bajo control 👌" : `${recs.length} ${recs.length === 1 ? 'cosa pendiente' : 'cosas pendientes'}`}
              </h2>
              {stats.critical > 0 && (
                <p className="text-sm text-cream/90 mt-1">
                  ⚠️ {stats.critical} {stats.critical === 1 ? 'urgente' : 'urgentes'} · atender ahora
                </p>
              )}
              {stats.critical === 0 && stats.high > 0 && (
                <p className="text-sm text-cream/90 mt-1">{stats.high} {stats.high === 1 ? 'recomendación' : 'recomendaciones'} prioritarias</p>
              )}
            </div>
          </div>

          {/* Recommendations list */}
          {recs.length === 0 ? (
            <div className="text-center py-16 bg-paper border border-border rounded-2xl">
              <div className="w-14 h-14 mx-auto rounded-full bg-olive/10 text-olive flex items-center justify-center">
                <Icon name="check" size={26} />
              </div>
              <p className="font-display text-xl font-semibold mt-4">Excelente trabajo</p>
              <p className="text-sm text-muted mt-1">No hay acciones pendientes ahora</p>
              <p className="text-[11px] text-muted mt-3">El asistente revisa cada 30 segundos</p>
            </div>
          ) : (
            recs.map(rec => <RecCard key={rec.id} rec={rec} onAction={handleAction} />)
          )}

          {/* Footer info */}
          {recs.length > 0 && (
            <div className="text-[11px] text-muted text-center pt-2">
              💡 Tip: toca "No ahora" para posponer 5 min · "Hecho" cuando lo hagas
            </div>
          )}
        </div>
      );
    }

    function RecCard({ rec, onAction }) {
      const colorMap = {
        critical: { bg: "bg-danger/10 border-danger", text: "text-danger", label: "URGENTE" },
        high:     { bg: "bg-clay/10 border-clay", text: "text-clay", label: "ALTA" },
        medium:   { bg: "bg-warn/10 border-warn", text: "text-warn", label: "MEDIA" },
        low:      { bg: "bg-paper border-border", text: "text-muted", label: "" }
      };
      const c = colorMap[rec.urgency];
      return (
        <div className={`border-2 rounded-2xl p-4 ${c.bg} ${rec.urgency === 'critical' ? 'shake' : ''}`}>
          <div className="flex items-start gap-3">
            <div className={`w-11 h-11 rounded-xl bg-paper border border-border flex items-center justify-center shrink-0 ${c.text}`}>
              <Icon name={rec.icon} size={20} />
            </div>
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-2 flex-wrap">
                {c.label && <span className={`text-[9px] font-bold uppercase tracking-wider px-1.5 py-0.5 rounded ${c.text} bg-paper`}>{c.label}</span>}
                {rec.ageLabel && <span className="text-[10px] text-muted font-mono">{rec.ageLabel}</span>}
              </div>
              <p className="font-bold text-sm mt-1 leading-tight">{rec.title}</p>
              <p className="text-xs text-muted mt-1 leading-relaxed">{rec.desc}</p>
            </div>
          </div>
          <div className="mt-3 grid grid-cols-3 gap-2">
            <button onClick={() => onAction(rec, "later")} className="py-2 bg-paper border border-border rounded-lg text-xs font-semibold text-muted hover:bg-cream">
              No ahora
            </button>
            <button onClick={() => onAction(rec, "dismiss")} className="py-2 bg-paper border border-border rounded-lg text-xs font-semibold text-muted hover:bg-cream">
              Descartar
            </button>
            <button onClick={() => onAction(rec, rec.actions[0] || "done")} className="py-2 bg-olive text-white rounded-lg text-xs font-bold inline-flex items-center justify-center gap-1">
              <Icon name="check" size={12} /> Hecho
            </button>
          </div>
        </div>
      );
    }

    function PedidosView() {
      const recent = [
        { id: "T-1042", mesa: 7, time: "21:28", total: 287.40, status: "served" },
        { id: "T-1043", mesa: 12, time: "21:30", total: 198.00, status: "ready" },
        { id: "T-1044", mesa: 3, time: "21:34", total: 245.80, status: "preparing" },
        { id: "T-1045", mesa: 9, time: "21:38", total: 78.40, status: "preparing" },
        { id: "T-1047", mesa: 11, time: "21:42", total: 89.90, status: "preparing" }
      ];
      return (
        <div className="px-5 py-5 space-y-3">
          <h2 className="font-display text-lg font-semibold">Pedidos del turno</h2>
          {recent.map(p => (
            <div key={p.id} className="bg-paper border border-border rounded-2xl p-4 flex items-center gap-3">
              <div className="w-12 h-12 rounded-xl bg-cream flex items-center justify-center font-display font-bold">{p.mesa}</div>
              <div className="flex-1 min-w-0">
                <p className="font-semibold text-sm">Mesa {p.mesa}</p>
                <p className="text-[11px] text-muted">{p.time} · {p.id}</p>
              </div>
              <div className="text-right">
                <p className="font-display font-bold">{PEN(p.total)}</p>
                <ItemStatus status={p.status} />
              </div>
            </div>
          ))}
        </div>
      );
    }

    // ─────────────────────────── APP ───────────────────────────
    function App() {
      const [tab, setTab] = useState("tomar");  // ← landing en "Tomar pedido" por defecto
      const [tables, setTables] = useState(ALL_TABLES_INIT);
      const [calls, setCalls] = useState(CALLS);
      const [selectedTable, setSelectedTable] = useState(null); // for "mis mesas" detail
      const [actionTable, setActionTable] = useState(null);     // for plano action sheet
      const [blockTarget, setBlockTarget] = useState(null);
      const [complaintTarget, setComplaintTarget] = useState(null);
      const [editTarget, setEditTarget] = useState(null);
      const [joinFirst, setJoinFirst] = useState(null);
      const [toast, setToast] = useState(null);

      const myTables = tables.filter(t => t.server === ME.name);

      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2200); };

      const handleAction = (action, tableId) => {
        const table = tables.find(t => t.id === tableId);
        switch (action) {
          case "complaint":
            setActionTable(null);
            setComplaintTarget(table);
            break;
          case "clearComplaint":
            setTables(prev => prev.map(t => t.id === tableId ? { ...t, complaint: null } : t));
            setActionTable(null);
            showToast(`Queja resuelta · Mesa ${tableId}`);
            break;
          case "joinStart":
            setActionTable(null);
            setJoinFirst(table);
            setTab("plano");
            showToast(`Selecciona la segunda mesa a unir con M${tableId}`);
            break;
          case "unjoin": {
            const partnerId = table.joinedWith;
            setTables(prev => prev.map(t => {
              if (t.id === tableId || t.id === partnerId) return { ...t, joinedWith: null, joinedSeats: 0 };
              return t;
            }));
            setActionTable(null);
            showToast(`Mesas separadas`);
            break;
          }
          case "blockStart":
            setActionTable(null);
            setBlockTarget(table);
            break;
          case "unblock":
            setTables(prev => prev.map(t => t.id === tableId ? { ...t, blocked: false, blockedReason: null } : t));
            setActionTable(null);
            showToast(`Mesa ${tableId} desbloqueada`);
            break;
          case "editStart":
            setActionTable(null);
            setEditTarget(table);
            break;
          case "viewOrder":
            setActionTable(null);
            setSelectedTable(table);
            break;
        }
      };

      const handlePlanoTap = (table) => {
        // If in join mode and we have a first selection, complete the join
        if (joinFirst) {
          if (joinFirst.id === table.id) {
            setJoinFirst(null);
            return;
          }
          // Adjacency check (any adjacent x or y)
          const adjacent = Math.abs(joinFirst.x - table.x) + Math.abs(joinFirst.y - table.y) <= 2;
          if (!adjacent) {
            showToast("Las mesas deben estar cerca para unirse");
            return;
          }
          if (table.blocked || table.joinedWith) {
            showToast("Esta mesa no está disponible");
            return;
          }
          setTables(prev => prev.map(t => {
            if (t.id === joinFirst.id) return { ...t, joinedWith: table.id, joinedSeats: table.seats };
            if (t.id === table.id) return { ...t, joinedWith: joinFirst.id, joinedSeats: joinFirst.seats };
            return t;
          }));
          showToast(`Mesas ${joinFirst.id} y ${table.id} unidas · ${joinFirst.seats + table.seats} asientos`);
          setJoinFirst(null);
          return;
        }
        setActionTable(table);
      };

      return (
        <div className="phone-frame">
          <Header />
          <Tabs active={tab} setActive={setTab} callCount={calls.length} aiCount={tables.filter(t => t.complaint || (t.items && t.items.some(i => i.status === "ready"))).length + calls.length} />

          {tab === "asistente" && <div data-feature="ai_assistant_waiter"><AsistenteView tables={tables} calls={calls} onAction={(rec, action) => {
            if (action === "resolved" && rec.type === "callPending") {
              setCalls(prev => prev.filter(c => `call-${c.id}` !== rec.id));
            }
            if (action === "resolved" && rec.type === "complaint") {
              setTables(prev => prev.map(t => t.id === rec.mesa ? { ...t, complaint: null } : t));
            }
            showToast(`✓ ${rec.title}`);
          }} /></div>}
          {tab === "mesas" && <MesasView tables={myTables} onTable={setSelectedTable} />}
          {tab === "tomar" && <TomarPedidoView tables={tables} setTables={setTables} onSent={() => showToast("✓ Pedido enviado a cocina")} />}
          {tab === "plano" && <PlanoView tables={tables} onTap={handlePlanoTap} joinMode={!!joinFirst} joinFirst={joinFirst} />}
          {tab === "llamados" && <LlamadosView calls={calls} onResolve={(id) => setCalls(c => c.filter(x => x.id !== id))} />}

          {/* FAB · Tomar pedido siempre accesible */}
          {tab !== "tomar" && (
            <button
              onClick={() => setTab("tomar")}
              className="fixed bottom-6 right-6 z-40 px-5 py-4 bg-gradient-to-br from-clay to-clay-dark text-white rounded-full shadow-2xl flex items-center gap-2 font-bold text-sm active:scale-95 transition"
              style={{ boxShadow: "0 12px 28px rgba(160,50,43,0.40)" }}
            >
              <span className="text-xl">📝</span>
              <span>Tomar pedido</span>
            </button>
          )}

          <TableDetail table={selectedTable} onClose={() => setSelectedTable(null)} />
          <TableActionSheet open={!!actionTable} table={actionTable} onClose={() => setActionTable(null)} onAction={handleAction} />
          <BlockReasonModal
            open={!!blockTarget}
            onClose={() => setBlockTarget(null)}
            onConfirm={(reason) => {
              setTables(prev => prev.map(t => t.id === blockTarget.id ? { ...t, blocked: true, blockedReason: reason } : t));
              showToast(`Mesa ${blockTarget.id} bloqueada · ${reason}`);
              setBlockTarget(null);
            }}
          />
          <ComplaintModal
            open={!!complaintTarget}
            onClose={() => setComplaintTarget(null)}
            onConfirm={(reason) => {
              setTables(prev => prev.map(t => t.id === complaintTarget.id ? { ...t, complaint: reason } : t));
              showToast(`Queja registrada · Cocina notificada`);
              setComplaintTarget(null);
            }}
          />
          <EditCapacityModal
            open={!!editTarget}
            table={editTarget}
            onClose={() => setEditTarget(null)}
            onConfirm={(seats) => {
              setTables(prev => prev.map(t => t.id === editTarget.id ? { ...t, seats } : t));
              showToast(`Mesa ${editTarget.id} actualizada · ${seats} asientos`);
              setEditTarget(null);
            }}
          />

          {joinFirst && (
            <button
              onClick={() => setJoinFirst(null)}
              className="fixed bottom-4 left-1/2 -translate-x-1/2 z-40 px-5 py-3 bg-gold text-white text-sm font-bold rounded-full shadow-lg"
            >
              Cancelar unión de mesas
            </button>
          )}

          {toast && (
            <div className="fixed bottom-4 left-1/2 -translate-x-1/2 z-50 px-5 py-3 bg-charcoal text-cream text-sm font-medium rounded-full shadow-lg max-w-[90%] text-center">
              {toast}
            </div>
          )}
        </div>
      );
    }

    // Error boundary para capturar errores y mostrarlos
    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { error: null }; }
      static getDerivedStateFromError(error) { return { error }; }
      componentDidCatch(error, info) { console.error("[Mozo error boundary]", error, info); }
      render() {
        if (this.state.error) {
          return (
            <div style={{padding: 24, fontFamily: "system-ui", color: "#A0322B", maxWidth: 420, margin: "40px auto"}}>
              <h2 style={{fontWeight: 700, marginBottom: 12}}>⚠️ Error en la app</h2>
              <pre style={{background:"#fff", padding: 12, borderRadius: 8, fontSize: 12, overflow: "auto", whiteSpace: "pre-wrap"}}>{String(this.state.error && this.state.error.message ? this.state.error.message : this.state.error)}</pre>
              <button onClick={() => location.reload()} style={{marginTop: 12, padding: "10px 20px", background: "#A0322B", color: "white", border: "none", borderRadius: 8}}>Recargar</button>
            </div>
          );
        }
        return this.props.children;
      }
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
</body>
</html>
