# Solo necesario para correr Postgres en desarrollo (alternativa a SQLite).
# Para correr el backend en sí, usar `pnpm dev` localmente.

services:
  postgres:
    image: postgres:16-alpine
    container_name: mesasmart-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: mesasmart
      POSTGRES_PASSWORD: dev_password_change_me
      POSTGRES_DB: mesasmart
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mesasmart"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mesasmart-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pg_data:
