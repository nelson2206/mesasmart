<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MesaSmart · Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        fontFamily: { display: ['"Playfair Display"', 'serif'], sans: ['Inter', 'system-ui'] },
        colors: { cream: '#FAF7F2', charcoal: '#1F1A17', ink: '#2A1F1A', muted: '#6B5D52', clay: { DEFAULT: '#A0322B', dark: '#7E2820' }, gold: '#C8941F', olive: '#2D7D5A', border: '#E8DFD3' }
      }}
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; background: #FAF7F2; color: #2A1F1A; }
    .font-display { font-family: 'Playfair Display', serif; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
  <script>
    // Backend URL por defecto · si el usuario no la tiene configurada, usa esta
    window.MESASMART_BACKEND_URL = "https://mesasmart-backend.onrender.com";
  </script>
  <script src="./assets/api.js"></script>

  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-3 mb-4">
        <div class="w-12 h-12 bg-clay rounded-xl flex items-center justify-center text-white font-bold">M</div>
        <span class="font-display text-2xl font-bold">MesaSmart</span>
      </div>
      <h1 class="font-display text-3xl font-semibold">Iniciar sesión</h1>
      <p class="text-muted mt-1">Accede a tu panel de administración</p>
    </div>

    <div class="bg-white border border-border rounded-2xl p-6 shadow-sm">
      <!-- Backend status (siempre visible) -->
      <div class="mb-4 flex items-center gap-2 text-xs">
        <span id="backend-dot" class="w-2 h-2 rounded-full bg-muted"></span>
        <span id="backend-status" class="text-muted">Verificando backend...</span>
      </div>

      <!-- Backend URL config (oculto por defecto · solo para devs) -->
      <details id="backend-config" class="mb-4">
        <summary class="text-[11px] text-muted hover:text-ink cursor-pointer select-none">⚙ Configuración avanzada</summary>
        <div class="mt-2 p-3 bg-cream rounded-lg">
          <label class="text-[10px] font-bold uppercase tracking-wider text-muted">Backend URL</label>
          <div class="mt-1.5 flex gap-2">
            <input id="backend-url" type="url" placeholder="https://mesasmart-backend.onrender.com" class="flex-1 px-2 py-1.5 bg-white border border-border rounded text-xs focus:outline-none focus:border-clay" />
            <button id="save-backend" class="px-3 py-1.5 bg-charcoal text-white text-[11px] font-semibold rounded">Guardar</button>
          </div>
          <p class="text-[10px] text-muted mt-1.5">Solo cambiar si tienes tu propio backend desplegado.</p>
        </div>
      </details>

      <form id="login-form" class="space-y-4">
        <div>
          <label class="text-sm font-semibold">Email</label>
          <input id="email" type="email" required value="admin@labrasa.pe" class="mt-1.5 w-full px-3 py-2.5 bg-cream border border-border rounded-lg text-sm focus:outline-none focus:border-clay" />
        </div>
        <div>
          <label class="text-sm font-semibold">Contraseña</label>
          <input id="password" type="password" required value="demo1234" class="mt-1.5 w-full px-3 py-2.5 bg-cream border border-border rounded-lg text-sm focus:outline-none focus:border-clay" />
        </div>
        <button type="submit" id="submit" class="w-full py-3 bg-clay hover:bg-clay-dark text-white font-semibold rounded-lg transition">
          Entrar
        </button>
      </form>

      <p id="error" class="mt-3 text-sm text-clay hidden"></p>

      <div class="mt-6 pt-5 border-t border-border">
        <p class="text-xs text-muted font-semibold mb-2">Demo accounts:</p>
        <div class="space-y-1 text-xs">
          <button class="quick-login w-full text-left py-1.5 px-2 hover:bg-cream rounded" data-email="admin@labrasa.pe">👨‍💼 admin@labrasa.pe · Administrador</button>
          <button class="quick-login w-full text-left py-1.5 px-2 hover:bg-cream rounded" data-email="maria@labrasa.pe">👩 maria@labrasa.pe · Mozo</button>
          <button class="quick-login w-full text-left py-1.5 px-2 hover:bg-cream rounded" data-email="cocina@labrasa.pe">👨‍🍳 cocina@labrasa.pe · Cocina</button>
          <button class="quick-login w-full text-left py-1.5 px-2 hover:bg-cream rounded" data-email="caja@labrasa.pe">💳 caja@labrasa.pe · Caja</button>
        </div>
        <p class="text-[10px] text-muted mt-3">Password universal: <code class="bg-cream px-1 rounded">demo1234</code></p>
      </div>
    </div>

    <p class="text-center text-xs text-muted mt-4">
      <a href="./index.html" class="hover:text-ink">← Volver al hub</a>
    </p>
  </div>

  <script>
    const api = window.MesaSmartAPI;
    const backendUrlInput = document.getElementById('backend-url');
    const backendStatus = document.getElementById('backend-status');
    const backendDot = document.getElementById('backend-dot');
    const errorEl = document.getElementById('error');

    // Init backend URL (auto-conectado a producción por window.MESASMART_BACKEND_URL)
    if (api.isConfigured()) {
      backendUrlInput.value = api.getBaseUrl();
      checkBackend();
    } else {
      backendStatus.textContent = 'Sin backend configurado';
      backendDot.className = 'w-2 h-2 rounded-full bg-clay';
    }

    document.getElementById('save-backend').onclick = () => {
      const url = backendUrlInput.value.trim();
      if (!url) return;
      api.configure({ baseUrl: url });
      checkBackend();
    };

    async function checkBackend() {
      backendStatus.textContent = 'Conectando con backend...';
      backendDot.className = 'w-2 h-2 rounded-full bg-warn animate-pulse';
      try {
        const res = await fetch(api.getBaseUrl() + '/health');
        if (res.ok) {
          backendStatus.textContent = 'Backend conectado · listo para entrar';
          backendStatus.className = 'text-olive font-semibold';
          backendDot.className = 'w-2 h-2 rounded-full bg-olive';
        } else {
          throw new Error('HTTP ' + res.status);
        }
      } catch (e) {
        backendStatus.textContent = `Backend dormido (puede tardar 30-60s la primera vez)`;
        backendStatus.className = 'text-warn';
        backendDot.className = 'w-2 h-2 rounded-full bg-warn animate-pulse';
        // Reintenta automáticamente
        setTimeout(checkBackend, 8000);
      }
    }

    // Quick fill demo accounts
    document.querySelectorAll('.quick-login').forEach(btn => {
      btn.onclick = () => {
        document.getElementById('email').value = btn.dataset.email;
        document.getElementById('password').value = 'demo1234';
      };
    });

    // Submit
    document.getElementById('login-form').onsubmit = async (e) => {
      e.preventDefault();
      errorEl.classList.add('hidden');
      const submit = document.getElementById('submit');
      submit.disabled = true;
      submit.textContent = 'Entrando...';
      try {
        if (!api.isConfigured()) {
          throw new Error('Configura primero el Backend URL arriba');
        }
        const data = await api.login(document.getElementById('email').value, document.getElementById('password').value);
        // Redirigir según rol
        const role = data.user.role;
        const target = {
          ADMIN: 'admin.html',
          CASHIER: 'admin.html',
          KITCHEN: 'cocina.html',
          WAITER: 'mozo.html'
        }[role] || 'index.html';
        window.location.href = target;
      } catch (err) {
        errorEl.textContent = err.message || 'Error al iniciar sesión';
        errorEl.classList.remove('hidden');
        submit.disabled = false;
        submit.textContent = 'Entrar';
      }
    };
  </script>
</body>
</html>
