# MesaSmart · Render Blueprint
# ─────────────────────────────────────
# Deploy automático del backend + Postgres con un solo click.
# Documentación: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: mesasmart-backend
    runtime: node
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma db push --skip-generate --accept-data-loss && npm run build && npx tsx prisma/seed.ts
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: mesasmart-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGINS
        value: https://nelson2206.github.io,http://localhost:5173,http://localhost:3000
      - key: API_BASE_URL
        sync: false
      # Mocks (puedes desactivar uno por uno cuando integres)
      - key: MOCK_OSE
        value: true
      - key: MOCK_PAYMENTS
        value: true
      - key: MOCK_EMAIL
        value: true
      - key: MOCK_STORAGE
        value: true
      - key: SUNAT_BOLETA_SERIE
        value: B001
      - key: SUNAT_FACTURA_SERIE
        value: F001
      - key: EMAIL_FROM
        value: hola@mesasmart.pe
      # AI · poner tu key en el dashboard de Render (no aquí)
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-haiku-4-5-20251001
      - key: AI_FEATURES_ENABLED
        value: true
      - key: LOG_LEVEL
        value: info

databases:
  - name: mesasmart-db
    databaseName: mesasmart
    user: mesasmart
    region: ohio
    plan: free
    postgresMajorVersion: 16
